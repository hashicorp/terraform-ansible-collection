#---
# Integration playbook for project target (contains full tests)
- name: Project integration tests
  hosts: localhost
  connection: local
  gather_facts: no
  tasks:
    - name: Set module defaults
      module_defaults:
        group/hashicorp.terraform.terraform:
          tfe_token: "{{ tfc_token }}"

      block:
        - name: Generate a unique project name
          ansible.builtin.set_fact:
            project_name: "{{ lookup('pipe', 'uuidgen')[:10] }}-project"

        - name: Create a Terraform project
          hashicorp.terraform.project: &create_project_task
            organization: "{{ organization }}"
            project: "{{ project_name }}"
            state: present
            description: "test project"
            execution_mode: "remote"
            auto_destroy_activity_duration: "14d"
            tag_bindings:
              - key: "env"
                value: "development"
          register: result_create

        - name: Debug created project
          ansible.builtin.debug:
            var: result_create

        - name: Set project_id fact from creation result
          ansible.builtin.set_fact:
            project_id: "{{ (result_create.data.id | default(result_create.id | default(''))) }}"

        - name: Fail if project creation did not return an id
          ansible.builtin.fail:
            msg: "Project creation failed; no ID was returned. result_create={{ result_create }}"
          when: project_id is not defined or project_id == ''

        - name: Assert project creation was successful
          ansible.builtin.assert:
            that:
              - result_create.changed

        - name: Idempotency test - create project again
          hashicorp.terraform.project: *create_project_task
          register: result_create_again

        - name: Assert project creation was idempotent
          ansible.builtin.assert:
            that:
              - not result_create_again.changed

        - name: Update project
          hashicorp.terraform.project: &update_project_task
            project: "{{ project_name }}"
            organization: "{{ organization }}"
            state: present
            description: "test project updated"
            execution_mode: "local"
            auto_destroy_activity_duration: "15d"
            tag_bindings:
              - key: "env"
                value: "production"
          register: result_update

        - name: Assert project update was successful
          ansible.builtin.assert:
            that:
              - result_update.changed
              - result_update.attributes.description == "test project updated"
              - result_update.attributes["default-execution-mode"] == "local"
              - result_update.attributes["auto-destroy-activity-duration"] == "15d"

        - name: Idempotency test - update project again
          hashicorp.terraform.project: *update_project_task
          register: result_update_again

        - name: Debug project update again
          ansible.builtin.debug:
            var: result_update_again

        - name: Assert project update was idempotent (allow harmless backend diffs)
          ansible.builtin.assert:
            that:
              - >
                not result_update_again.changed or (
                  result_update_again.attributes.description == result_update.attributes.description and
                  result_update_again.attributes["default-execution-mode"] == result_update.attributes["default-execution-mode"] and
                  result_update_again.attributes["auto-destroy-activity-duration"] == result_update.attributes["auto-destroy-activity-duration"]
                )

        - name: Update project with project_id
          hashicorp.terraform.project:
            project_id: "{{ project_id }}"
            state: present
            auto_destroy_activity_duration: "17d"
          register: result_update_with_project_id
          when: project_id is defined and project_id != ''

        - name: Assert project update with project_id was successful
          ansible.builtin.assert:
            that:
              - result_update_with_project_id.changed

        - name: Idempotency test - update project with project_id again
          hashicorp.terraform.project:
            project_id: "{{ project_id }}"
            state: present
            auto_destroy_activity_duration: "17d"
          register: result_update_with_project_id_again
          when: project_id is defined and project_id != ''

        - name: Assert project update with project_id was idempotent
          ansible.builtin.assert:
            that:
              - not result_update_with_project_id_again.changed

        # Agent Pool Tests
        - name: Generate unique agent pool name
          ansible.builtin.set_fact:
            agent_pool_name: "{{ project_name }}-agent-pool"

        - name: Create a Terraform agent pool with unique name
          ansible.builtin.uri:
            url: "https://app.terraform.io/api/v2/organizations/{{ organization }}/agent-pools"
            method: POST
            headers:
              Authorization: "Bearer {{ tfc_token }}"
              Content-Type: "application/vnd.api+json"
            body_format: json
            body:
              data:
                attributes:
                  name: "{{ agent_pool_name }}"
                type: "agent-pools"
            return_content: true
            status_code: 201
            validate_certs: no
          no_log: true
          register: agent_pool_create_response

        - name: Set a fact for 'agent_pool_id'
          ansible.builtin.set_fact:
            agent_pool_id: "{{ agent_pool_create_response.json.data.id }}"

        - name: Update project with agent execution mode and default agent pool
          hashicorp.terraform.project: &update_project_agent_task
            project_id: "{{ project_id }}"
            state: present
            execution_mode: "agent"
            default_agent_pool_id: "{{ agent_pool_id }}"
            description: "project with agent execution mode"
          register: result_update_agent

        - name: Assert project update with agent pool was successful
          ansible.builtin.assert:
            that:
              - result_update_agent.changed
              - result_update_agent.attributes["default-execution-mode"] == "agent"
              - result_update_agent.attributes["description"] == "project with agent execution mode"

        - name: Idempotency test - update project with agent pool again
          hashicorp.terraform.project: *update_project_agent_task
          register: result_update_agent_again

        - name: Assert project update with agent pool was idempotent
          ansible.builtin.assert:
            that:
              - not result_update_agent_again.changed

        - name: Update project to change execution mode back to remote
          hashicorp.terraform.project:
            project_id: "{{ project_id }}"
            state: present
            execution_mode: "remote"
            description: "project back to remote mode"
          register: result_update_remote

        - name: Assert project update back to remote mode was successful
          ansible.builtin.assert:
            that:
              - result_update_remote.changed
              - result_update_remote.attributes["default-execution-mode"] == "remote"
              - result_update_remote.attributes["description"] == "project back to remote mode"

        - name: Create a second project with agent execution mode from the start
          hashicorp.terraform.project:
            organization: "{{ organization }}"
            project: "{{ project_name }}-agent"
            state: present
            description: "test project with agent mode"
            execution_mode: "agent"
            default_agent_pool_id: "{{ agent_pool_id }}"
            auto_destroy_activity_duration: "14d"
          register: result_create_agent

        - name: Set project_agent_id fact from creation result
          ansible.builtin.set_fact:
            project_agent_id: "{{ (result_create_agent.data.id | default(result_create_agent.id | default(''))) }}"

        - name: Debug result of second project creation
          ansible.builtin.debug:
            var: result_create_agent

        - name: Fail if second project creation result is missing data
          ansible.builtin.fail:
            msg: "Project creation for result_create_agent did not return expected data. result_create_agent={{ result_create_agent }}"
          when: result_create_agent is not defined or result_create_agent.data is not defined or result_create_agent.data.attributes is not defined

        - name: Assert second project creation with agent pool was successful
          ansible.builtin.assert:
            that:
              - result_create_agent.changed
              - result_create_agent.data.attributes["default-execution-mode"] == "agent"
              - result_create_agent.data.attributes["description"] == "test project with agent mode"
              - result_create_agent.data.attributes["auto-destroy-activity-duration"] == "14d"

        - name: List projects (verify created project is present)
          ansible.builtin.uri:
            url: "https://app.terraform.io/api/v2/organizations/{{ organization }}/projects?filter[names]={{ project_name }}"
            method: GET
            headers:
              Authorization: "Bearer {{ tfc_token }}"
              Content-Type: "application/vnd.api+json"
            return_content: true
            status_code: 200
            validate_certs: no
          register: list_projects_response

        - name: Debug list projects response
          ansible.builtin.debug:
            var: list_projects_response

        - name: Fail if list projects did not return expected data
          ansible.builtin.fail:
            msg: "Listing projects did not return expected data: {{ list_projects_response }}"
          when: list_projects_response is not defined or list_projects_response.json is not defined or list_projects_response.json.data is not defined

        - name: Assert created project present in list
          ansible.builtin.assert:
            that:
              - list_projects_response.json.data | length > 0
              - list_projects_response.json.data[0].attributes.name == project_name

        - name: Get project tag bindings for first project
          ansible.builtin.uri:
            url: "https://app.terraform.io/api/v2/projects/{{ project_id }}/tag-bindings"
            method: GET
            headers:
              Authorization: "Bearer {{ tfc_token }}"
              Content-Type: "application/vnd.api+json"
            return_content: true
            status_code: 200
            validate_certs: no
          register: tag_bindings_response

        - name: Debug project tag bindings response
          ansible.builtin.debug:
            var: tag_bindings_response

        - name: Set fact for project tag bindings list
          ansible.builtin.set_fact:
            project_tag_bindings: "{{ tag_bindings_response.json.data | default([]) }}"
          when: tag_bindings_response is defined and tag_bindings_response.json is defined

        - name: Check for 'env' tag binding on first project
          ansible.builtin.set_fact:
            project_has_env_tag: "{{ (project_tag_bindings | selectattr('attributes.key','equalto','env') | list | length) > 0 }}"
          when: project_tag_bindings is defined

        - name: Assert 'env' tag binding exists for first project
          ansible.builtin.assert:
            that:
              - project_has_env_tag
          when: project_tag_bindings is defined

        - name: Clear existing tags for the project
          hashicorp.terraform.project:
            project_id: "{{ project_id }}"
            state: present
            tag_bindings: []
          register: result_clear_tags

        - name: Debug clear tags result
          ansible.builtin.debug:
            var: result_clear_tags

        - name: Set intended tag update payload
          ansible.builtin.set_fact:
            tag_update_inputs:
              - key: "env"
                value: "staging"
              - key: "team"
                value: "engineering"

        - name: Debug tag update inputs
          ansible.builtin.debug:
            var: tag_update_inputs

        - name: Wait briefly for API propagation before updating tags
          ansible.builtin.pause:
            seconds: 5

        - name: Update project tag bindings via module
          hashicorp.terraform.project:
            project_id: "{{ project_id }}"
            state: present
            tag_bindings: "{{ tag_update_inputs }}"
          register: result_tag_update

        - name: Debug tag update result
          ansible.builtin.debug:
            var: result_tag_update

        - name: Get project tag bindings after update (retry until updated)
          ansible.builtin.uri:
            url: "https://app.terraform.io/api/v2/projects/{{ project_id }}/tag-bindings"
            method: GET
            headers:
              Authorization: "Bearer {{ tfc_token }}"
              Content-Type: "application/vnd.api+json"
            return_content: true
            status_code: 200
            validate_certs: no
          register: tag_bindings_after_update
          retries: 5
          delay: 5
          until: >
            (tag_bindings_after_update.json.data | selectattr('attributes.key','equalto','env') | map(attribute='attributes.value') | list) == ['staging'] and
            (tag_bindings_after_update.json.data | selectattr('attributes.key','equalto','team') | map(attribute='attributes.value') | list) == ['engineering']

        - name: Debug project tag bindings after update
          ansible.builtin.debug:
            var: tag_bindings_after_update

        - name: Update the second project's agent pool (same pool, testing idempotency)
          hashicorp.terraform.project:
            project_id: "{{ project_agent_id }}"
            state: present
            execution_mode: "agent"
            default_agent_pool_id: "{{ agent_pool_id }}"
          register: result_update_agent_same

        - name: Assert update with same agent pool was idempotent
          ansible.builtin.assert:
            that:
              - not result_update_agent_same.changed

      always:
        - name: Update first project to remove agent pool before deletion
          hashicorp.terraform.project:
            project_id: "{{ project_id }}"
            state: present
            execution_mode: "remote"
          register: result_update_before_delete
          when: project_id is defined and project_id != ''
          ignore_errors: true

        - name: Delete first project
          hashicorp.terraform.project:
            project_id: "{{ project_id }}"
            state: absent
          register: result_delete
          when: project_id is defined and project_id != ''
          ignore_errors: true

        - name: Update second project to remove agent pool before deletion
          hashicorp.terraform.project:
            project_id: "{{ project_agent_id }}"
            state: present
            execution_mode: "remote"
          register: result_update_agent_before_delete
          when: project_agent_id is defined and project_agent_id != ''
          ignore_errors: true

        - name: Delete second project
          hashicorp.terraform.project:
            project_id: "{{ project_agent_id }}"
            state: absent
          register: result_delete_agent
          when: project_agent_id is defined and project_agent_id != ''
          ignore_errors: true

        - name: Delete agent pool
          ansible.builtin.uri:
            url: "https://app.terraform.io/api/v2/agent-pools/{{ agent_pool_id }}"
            method: DELETE
            headers:
              Authorization: "Bearer {{ tfc_token }}"
              Content-Type: "application/vnd.api+json"
            status_code: 204
            return_content: true
            validate_certs: no
          no_log: true
          register: agent_pool_delete_response
          when: agent_pool_id is defined
          ignore_errors: true
