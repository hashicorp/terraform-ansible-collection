---
- name: Set module defaults
  module_defaults:
    group/hashicorp.terraform.terraform:
      tfe_token: "{{ tfc_token }}"

  block:
    - name: Generate unique suffix
      ansible.builtin.set_fact:
        suffix: "{{ lookup('pipe', 'uuidgen')[:8] }}"

    - name: Set fact for resource names
      ansible.builtin.set_fact:
        varset_name: "varset-var-{{ suffix }}"

    - name: Create a hosting variable set
      hashicorp.terraform.variable_sets:
        organization: "{{ organization }}"
        name: "{{ varset_name }}"
        description: "integration test varset for variable_set_variable"
        global: false
        priority: false
        state: present
      register: result_varset

    - name: Set varset_id fact
      ansible.builtin.set_fact:
        varset_id: "{{ result_varset.id }}"

    # ---------- create ----------
    - name: Create a Terraform input variable in the set
      hashicorp.terraform.variable_set_variable: &create_var
        variable_set_id: "{{ varset_id }}"
        key: "region"
        value: "us-east-1"
        category: "terraform"
        description: "default region"
        hcl: false
        sensitive: false
        state: present
      register: result_create

    - name: Assert variable creation was successful
      ansible.builtin.assert:
        that:
          - result_create.changed
          - result_create.id is defined
          - result_create.key == "region"
          - result_create.category == "terraform"

    - name: Set variable_id fact
      ansible.builtin.set_fact:
        variable_id: "{{ result_create.id }}"

    # ---------- idempotent re-create ----------
    - name: Idempotency test - create same variable again
      hashicorp.terraform.variable_set_variable: *create_var
      register: result_create_again

    - name: Assert re-create is idempotent
      ansible.builtin.assert:
        that:
          - not result_create_again.changed

    # ---------- update via (variable_set, key) ----------
    - name: Update the variable's value via key lookup
      hashicorp.terraform.variable_set_variable: &update_var
        variable_set_id: "{{ varset_id }}"
        key: "region"
        value: "eu-west-1"
        category: "terraform"
        description: "default region"
        hcl: false
        sensitive: false
        state: present
      register: result_update

    - name: Assert update was successful
      ansible.builtin.assert:
        that:
          - result_update.changed
          - result_update.key == "region"

    - name: Idempotency test - apply same update again
      hashicorp.terraform.variable_set_variable: *update_var
      register: result_update_again

    - name: Assert repeated update is idempotent
      ansible.builtin.assert:
        that:
          - not result_update_again.changed

    # ---------- sensitive variable ----------
    - name: Create a sensitive variable (write-only value)
      hashicorp.terraform.variable_set_variable:
        variable_set_id: "{{ varset_id }}"
        key: "APP_ENV"
        value: "production"
        category: "env"
        state: present
      register: result_env_create

    - name: Assert env variable creation was successful
      ansible.builtin.assert:
        that:
          - result_env_create.changed
          - result_env_create.key == "APP_ENV"
          - result_env_create.category == "env"

    - name: Create a sensitive variable (write-only value)
      hashicorp.terraform.variable_set_variable:
        variable_set_id: "{{ varset_id }}"
        key: "APP_SECRET"
        value: "s3cr3t"
        category: "env"
        sensitive: true
        state: present
      register: result_sensitive

    - name: Assert sensitive variable creation was successful
      ansible.builtin.assert:
        that:
          - result_sensitive.changed
          - result_sensitive.sensitive

    - name: Idempotency test - re-run sensitive variable with same input
      hashicorp.terraform.variable_set_variable:
        variable_set_id: "{{ varset_id }}"
        key: "APP_SECRET"
        value: "s3cr3t"
        category: "env"
        sensitive: true
        state: present
      register: result_sensitive_again

    - name: Assert sensitive re-run is idempotent (value cannot be diffed)
      ansible.builtin.assert:
        that:
          - not result_sensitive_again.changed

    # ---------- check-mode ----------
    - name: Check-mode update with drifted value
      hashicorp.terraform.variable_set_variable:
        variable_set_id: "{{ varset_id }}"
        key: "region"
        value: "ap-south-1"
        category: "terraform"
        state: present
      check_mode: true
      register: result_check

    - name: Assert check-mode reports change without mutating
      ansible.builtin.assert:
        that:
          - result_check.changed
          - "'check mode' in result_check.msg"

    - name: Verify check-mode did not actually mutate
      hashicorp.terraform.variable_set_variable: *update_var
      register: result_post_check

    - name: Assert value is still the pre-check value
      ansible.builtin.assert:
        that:
          - not result_post_check.changed

    # ---------- delete ----------
    - name: Delete the variable by ID
      hashicorp.terraform.variable_set_variable:
        variable_set_id: "{{ varset_id }}"
        variable_id: "{{ variable_id }}"
        state: absent
      register: result_delete

    - name: Assert delete was successful
      ansible.builtin.assert:
        that:
          - result_delete.changed
          - "'deleted' in result_delete.msg"

    - name: Delete the variable again (no-op)
      hashicorp.terraform.variable_set_variable:
        variable_set_id: "{{ varset_id }}"
        variable_id: "{{ variable_id }}"
        state: absent
      register: result_delete_again

    - name: Assert repeated delete is idempotent
      ansible.builtin.assert:
        that:
          - not result_delete_again.changed
          - "'absent' in result_delete_again.msg"

    - name: Delete a variable by key
      hashicorp.terraform.variable_set_variable:
        variable_set_id: "{{ varset_id }}"
        key: "APP_ENV"
        state: absent
      register: result_delete_by_key

    - name: Assert delete by key was successful
      ansible.builtin.assert:
        that:
          - result_delete_by_key.changed

  always:
    - name: Cleanup - delete the hosting variable set
      hashicorp.terraform.variable_sets:
        organization: "{{ organization }}"
        name: "{{ varset_name }}"
        state: absent
      when: varset_name is defined
      failed_when: false
