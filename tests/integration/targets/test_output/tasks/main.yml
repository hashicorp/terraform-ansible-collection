---
- name: Set module defaults
  module_defaults:
    group/hashicorp.terraform.terraform:
      tf_token: "{{ tfc_token }}"

  block:
    - name: Generate a unique ID
      ansible.builtin.set_fact:
        unique_id: "{{ lookup('pipe', 'uuidgen') }}"
        poll_interval: 10
        poll_timeout: 300

    - name: Generate unique workspace name
      ansible.builtin.set_fact:
        workspace_name: "{{ unique_id }}-output-test-workspace"

    - name: Create a Terraform workspace with unique name
      hashicorp.terraform.workspace:
        workspace: "{{ workspace_name }}"
        organization: "{{ organization }}"
        state: present
      register: workspace_create_response

    - name: Set a fact for 'workspace_id'
      ansible.builtin.set_fact:
        workspace_id: "{{ workspace_create_response.id }}"

    - name: Create temporary directory to store Terraform configuration
      ansible.builtin.tempfile:
        state: directory
      register: temp_dir

    - name: Generate Terraform configuration with outputs
      ansible.builtin.template:
        src: "main.tf.j2"
        dest: "{{ temp_dir.path }}/main.tf"
        mode: "0644"

    - name: Create configuration version with auto_queue_runs set to false
      hashicorp.terraform.configuration_version:
        workspace_id: "{{ workspace_id }}"
        configuration_files_path: "{{ temp_dir.path }}"
        auto_queue_runs: false
        tf_validate_certs: true
        poll_interval: "{{ poll_interval }}"
        poll_timeout: "{{ poll_timeout }}"
        state: present
      register: config_version_result

    - name: Assert create and upload success
      ansible.builtin.assert:
        that:
          - config_version_result.changed
          - config_version_result.attributes.status == "uploaded"

    - name: Create a run to generate outputs
      hashicorp.terraform.run:
        workspace_id: "{{ workspace_id }}"
        run_message: "Initial run to create outputs"
        state: "present"
        configuration_version: "{{ config_version_result.id }}"
        poll: true
        poll_interval: "{{ poll_interval }}"
        poll_timeout: "{{ poll_timeout }}"
      register: run_result

    - name: Assert run was created and planned
      ansible.builtin.assert:
        that:
          - run_result.changed
          - run_result.attributes.status == "planned"

    - name: Apply the run to generate outputs
      hashicorp.terraform.run:
        run_id: "{{ run_result.id }}"
        state: "applied"
        poll: true
        poll_interval: "{{ poll_interval }}"
        poll_timeout: "{{ poll_timeout }}"
      register: run_apply_result

    - name: Assert run was applied successfully
      ansible.builtin.assert:
        that:
          - run_apply_result.changed
          - run_apply_result.attributes.status == "applied"

    - name: Get all outputs by workspace_id
      hashicorp.terraform.output:
        workspace_id: "{{ workspace_id }}"
      register: all_outputs_by_id

    - name: Assert all outputs retrieved by workspace_id
      ansible.builtin.assert:
        that:
          - all_outputs_by_id.changed == false
          - all_outputs_by_id.outputs is defined
          - all_outputs_by_id.count is defined
          - all_outputs_by_id.count == 6
          - all_outputs_by_id.outputs | selectattr('name', 'equalto', 'vpc1_id') | list | length == 1
          - all_outputs_by_id.outputs | selectattr('name', 'equalto', 'vpc2_id') | list | length == 1
          - all_outputs_by_id.outputs | selectattr('name', 'equalto', 'environment') | list | length == 1
          - all_outputs_by_id.outputs | selectattr('name', 'equalto', 'sensitive_token') | list | length == 1
          - all_outputs_by_id.outputs | selectattr('name', 'equalto', 'vpc_config') | list | length == 1
          - all_outputs_by_id.outputs | selectattr('name', 'equalto', 'vpc_ids') | list | length == 1
        fail_msg: "Failed to retrieve all outputs by workspace_id"

    - name: Get all outputs by workspace name and organization
      hashicorp.terraform.output:
        workspace: "{{ workspace_name }}"
        organization: "{{ organization }}"
      register: all_outputs_by_name

    - name: Assert all outputs retrieved by workspace name
      ansible.builtin.assert:
        that:
          - all_outputs_by_name.changed == false
          - all_outputs_by_name.outputs is defined
          - all_outputs_by_name.count == 6
        fail_msg: "Failed to retrieve all outputs by workspace name"

    - name: Find sensitive output in default results
      ansible.builtin.set_fact:
        sensitive_output_default: "{{ all_outputs_by_id.outputs | selectattr('name', 'equalto', 'sensitive_token') | first }}"

    - name: Assert sensitive value is masked
      ansible.builtin.assert:
        that:
          - sensitive_output_default.sensitive == true
          - sensitive_output_default.value == "<sensitive>"
        fail_msg: "Sensitive value was not masked by default"

    - name: Get all outputs with sensitive values displayed
      hashicorp.terraform.output:
        workspace_id: "{{ workspace_id }}"
        display_sensitive: true
      register: all_outputs_sensitive

    - name: Find sensitive output with display_sensitive=true
      ansible.builtin.set_fact:
        sensitive_output_displayed: "{{ all_outputs_sensitive.outputs | selectattr('name', 'equalto', 'sensitive_token') | first }}"

    - name: Assert sensitive value is displayed
      ansible.builtin.assert:
        that:
          - sensitive_output_displayed.sensitive == true
          - sensitive_output_displayed.value != "<sensitive>"
          - sensitive_output_displayed.value is string
          - sensitive_output_displayed.value | length > 0
        fail_msg: "Sensitive value was not displayed when display_sensitive=true"

    - name: Get specific non-sensitive output by name
      hashicorp.terraform.output:
        workspace_id: "{{ workspace_id }}"
        name: "environment"
      register: output_by_name

    - name: Assert output retrieved by name
      ansible.builtin.assert:
        that:
          - output_by_name.changed == false
          - output_by_name.output is defined
          - output_by_name.output.name == "environment"
          - output_by_name.output.value == "test"
          - output_by_name.output.sensitive == false
        fail_msg: "Failed to retrieve output by name"

    - name: Get sensitive output by name (masked)
      hashicorp.terraform.output:
        workspace_id: "{{ workspace_id }}"
        name: "sensitive_token"
      register: sensitive_by_name_masked

    - name: Assert sensitive output is masked
      ansible.builtin.assert:
        that:
          - sensitive_by_name_masked.output.name == "sensitive_token"
          - sensitive_by_name_masked.output.value == "<sensitive>"
          - sensitive_by_name_masked.output.sensitive == true
        fail_msg: "Sensitive output by name was not masked"

    - name: Get sensitive output by name (displayed)
      hashicorp.terraform.output:
        workspace_id: "{{ workspace_id }}"
        name: "sensitive_token"
        display_sensitive: true
      register: sensitive_by_name_displayed

    - name: Assert sensitive output is displayed
      ansible.builtin.assert:
        that:
          - sensitive_by_name_displayed.output.name == "sensitive_token"
          - sensitive_by_name_displayed.output.value != "<sensitive>"
          - sensitive_by_name_displayed.output.sensitive == true
        fail_msg: "Sensitive output by name was not displayed"

    - name: Get output by name with workspace and organization
      hashicorp.terraform.output:
        workspace: "{{ workspace_name }}"
        organization: "{{ organization }}"
        name: "vpc1_id"
      register: output_by_name_org

    - name: Assert output retrieved by name with workspace and organization
      ansible.builtin.assert:
        that:
          - output_by_name_org.output.name == "vpc1_id"
          - output_by_name_org.output.value is string
          - output_by_name_org.output.value | length > 0
        fail_msg: "Failed to retrieve output by name using workspace and organization"

    - name: Extract output_id from previous result
      ansible.builtin.set_fact:
        test_output_id: "{{ output_by_name.output.id }}"

    - name: Get output by state_version_output_id
      hashicorp.terraform.output:
        state_version_output_id: "{{ test_output_id }}"
      register: output_by_id

    - name: Assert output retrieved by ID
      ansible.builtin.assert:
        that:
          - output_by_id.output.id == test_output_id
          - output_by_id.output.name == "environment"
          - output_by_id.output.value == "test"
        fail_msg: "Failed to retrieve output by state_version_output_id"

    - name: Get sensitive output ID
      ansible.builtin.set_fact:
        sensitive_output_id: "{{ sensitive_by_name_masked.output.id }}"

    - name: Get sensitive output by ID with display_sensitive=true
      hashicorp.terraform.output:
        state_version_output_id: "{{ sensitive_output_id }}"
        display_sensitive: true
      register: sensitive_output_by_id

    - name: Assert sensitive output retrieved by ID
      ansible.builtin.assert:
        that:
          - sensitive_output_by_id.output.id == sensitive_output_id
          - sensitive_output_by_id.output.sensitive == true
          - sensitive_output_by_id.output.value != "<sensitive>"
        fail_msg: "Failed to retrieve sensitive output by ID"

    - name: Get output using output_id alias
      hashicorp.terraform.output:
        output_id: "{{ test_output_id }}"
      register: output_by_alias

    - name: Assert alias works
      ansible.builtin.assert:
        that:
          - output_by_alias.output.id == test_output_id
        fail_msg: "output_id alias failed"

    - name: Get complex object output
      hashicorp.terraform.output:
        workspace_id: "{{ workspace_id }}"
        name: "vpc_config"
      register: complex_output

    - name: Assert complex output structure
      ansible.builtin.assert:
        that:
          - complex_output.output.name == "vpc_config"
          - complex_output.output.type == "object"
          - complex_output.output.value is mapping
          - complex_output.output.value.vpc1_cidr == "10.0.0.0/16"
          - complex_output.output.value.vpc2_cidr == "10.1.0.0/16"
          - complex_output.output.value.region == "us-east-1"
        fail_msg: "Failed to retrieve complex output"

    - name: Get list output
      hashicorp.terraform.output:
        workspace_id: "{{ workspace_id }}"
        name: "vpc_ids"
      register: list_output

    - name: Assert list output
      ansible.builtin.assert:
        that:
          - list_output.output.name == "vpc_ids"
          - list_output.output.value is sequence
          - list_output.output.value | length == 2
        fail_msg: "Failed to retrieve list output"

    # Error handling tests
    - name: Test with invalid state_version_output_id
      hashicorp.terraform.output:
        state_version_output_id: "wsout-invalid123"
      ignore_errors: true
      register: invalid_output_id

    - name: Assert error for invalid output ID
      ansible.builtin.assert:
        that:
          - invalid_output_id is failed
          - '"not found" in invalid_output_id.msg'
        fail_msg: "Invalid output ID did not produce expected error"

    - name: Test with invalid workspace_id
      hashicorp.terraform.output:
        workspace_id: "ws-invalid123"
      ignore_errors: true
      register: invalid_workspace_id

    - name: Assert error for invalid workspace ID
      ansible.builtin.assert:
        that:
          - invalid_workspace_id is failed
          - '"not found" in invalid_workspace_id.msg'
        fail_msg: "Invalid workspace ID did not produce expected error"

    - name: Test with invalid workspace name
      hashicorp.terraform.output:
        workspace: "nonexistent-workspace-xyz"
        organization: "{{ organization }}"
      ignore_errors: true
      register: invalid_workspace_name

    - name: Assert error for invalid workspace name
      ansible.builtin.assert:
        that:
          - invalid_workspace_name is failed
          - '"not found" in invalid_workspace_name.msg'
        fail_msg: "Invalid workspace name did not produce expected error"

    - name: Test with non-existent output name
      hashicorp.terraform.output:
        workspace_id: "{{ workspace_id }}"
        name: "nonexistent_output"
      ignore_errors: true
      register: invalid_output_name

    - name: Assert error for invalid output name
      ansible.builtin.assert:
        that:
          - invalid_output_name is failed
          - '"not found" in invalid_output_name.msg'
        fail_msg: "Invalid output name did not produce expected error"

    # Lookup plugin tests
    - name: Test lookup plugin with state_version_output_id
      ansible.builtin.set_fact:
        lookup_by_id: "{{ lookup('hashicorp.terraform.tf_output', state_version_output_id=test_output_id, tf_token=tfc_token) }}"

    - name: Assert lookup by ID works
      ansible.builtin.assert:
        that:
          - lookup_by_id == "test"
        fail_msg: "Lookup plugin failed with state_version_output_id"

    - name: Test lookup plugin by name
      ansible.builtin.set_fact:
        lookup_by_name: "{{ lookup('hashicorp.terraform.tf_output', name='environment', workspace_id=workspace_id, tf_token=tfc_token) }}"

    - name: Assert lookup by name works
      ansible.builtin.assert:
        that:
          - lookup_by_name == "test"
        fail_msg: "Lookup plugin failed with name parameter"

    - name: Test lookup plugin for all outputs
      ansible.builtin.set_fact:
        lookup_all_outputs: "{{ lookup('hashicorp.terraform.tf_output', workspace_id=workspace_id, tf_token=tfc_token) }}"

    - name: Assert lookup returns all outputs
      ansible.builtin.assert:
        that:
          - lookup_all_outputs is sequence
          - lookup_all_outputs | length == 6
        fail_msg: "Lookup plugin failed to retrieve all outputs"

    - name: Test lookup plugin with display_sensitive
      ansible.builtin.set_fact:
        lookup_sensitive: >-
          {{ lookup(
              'hashicorp.terraform.tf_output',
              name='sensitive_token',
              workspace_id=workspace_id,
              display_sensitive=true,
              tf_token=tfc_token
          ) }}

    - name: Assert lookup displays sensitive value
      ansible.builtin.assert:
        that:
          - lookup_sensitive != "<sensitive>"
          - lookup_sensitive is string
          - lookup_sensitive | length > 0
        fail_msg: "Lookup plugin failed to display sensitive value"

    - name: Test lookup with workspace name and organization
      ansible.builtin.set_fact:
        lookup_by_workspace_name: >-
          {{ lookup(
              'hashicorp.terraform.tf_output',
              name='vpc1_id',
              workspace=workspace_name,
              organization=organization,
              tf_token=tfc_token
          ) }}

    - name: Assert lookup with workspace name works
      ansible.builtin.assert:
        that:
          - lookup_by_workspace_name is string
          - lookup_by_workspace_name | length > 0
        fail_msg: "Lookup plugin failed with workspace name and organization"

    - name: Verify all required fields in output
      ansible.builtin.set_fact:
        sample_output: "{{ all_outputs_by_id.outputs | first }}"

    - name: Assert output has all required fields
      ansible.builtin.assert:
        that:
          - sample_output.id is defined
          - sample_output.name is defined
          - sample_output.value is defined
          - sample_output.type is defined
          - sample_output.detailed_type is defined
          - sample_output.sensitive is defined
        fail_msg: "Output missing required fields"

  always:
    - name: Create a destroy run to clean up resources
      hashicorp.terraform.run:
        workspace_id: "{{ workspace_id }}"
        run_message: "Destroy run to clean up test resources"
        state: "present"
        is_destroy: true
        poll: true
        poll_interval: "{{ poll_interval }}"
        poll_timeout: "{{ poll_timeout }}"
      when: workspace_id is defined
      register: destroy_run_result
      failed_when: false

    - name: Apply destroy run
      hashicorp.terraform.run:
        run_id: "{{ destroy_run_result.id }}"
        state: "applied"
        poll: true
        poll_interval: "{{ poll_interval }}"
        poll_timeout: "{{ poll_timeout }}"
      when: destroy_run_result.id is defined
      failed_when: false

    - name: Force unlock workspace
      hashicorp.terraform.workspace:
        workspace_id: "{{ workspace_id }}"
        state: unlocked
        force: true
      when: workspace_id is defined
      failed_when: false

    - name: Delete test workspace
      hashicorp.terraform.workspace:
        workspace_id: "{{ workspace_id }}"
        state: absent
        force: true
      when: workspace_id is defined
      failed_when: false

    - name: Clean up config directory
      ansible.builtin.file:
        path: "{{ temp_dir.path }}"
        state: absent
      when: temp_dir.path is defined
      failed_when: false
