---
- name: Set module defaults
  module_defaults:
    group/hashicorp.terraform.terraform:
      tfe_token: "{{ tfc_token }}"

  block:
    # ------------------------------------------------------------------
    # Setup: unique names and IDs
    # ------------------------------------------------------------------
    - name: Generate a unique ID
      ansible.builtin.set_fact:
        unique_id: "{{ lookup('pipe', 'uuidgen') }}"

    - name: Generate unique workspace name
      ansible.builtin.set_fact:
        workspace_name: "{{ unique_id[:30] }}-twa-test"

    - name: Create a workspace for the test
      hashicorp.terraform.workspace:
        workspace: "{{ workspace_name }}"
        organization: "{{ organization }}"
        state: present
      register: workspace_create_response

    - name: Set workspace_id fact
      ansible.builtin.set_fact:
        workspace_id: "{{ workspace_create_response.id }}"

    - name: Generate unique team name
      ansible.builtin.set_fact:
        team_name: "{{ unique_id[:30] }}-twa-team"

    - name: Create a team for the test
      hashicorp.terraform.team:
        organization: "{{ organization }}"
        name: "{{ team_name }}"
        visibility: secret
        state: present
      register: team_create_response

    - name: Set created team ID fact
      ansible.builtin.set_fact:
        created_team_id: "{{ team_create_response.id }}"

    - name: Look up the team by organization and name
      hashicorp.terraform.team_info:
        organization: "{{ organization }}"
        name: "{{ team_name }}"
      register: team_info_response

    - name: Set team_id fact
      ansible.builtin.set_fact:
        team_id: "{{ team_info_response.team.id }}"

    # ------------------------------------------------------------------
    # 1. Grant read access
    # ------------------------------------------------------------------
    - name: Grant team read access to workspace
      hashicorp.terraform.team_workspace_access:
        team_id: "{{ team_id }}"
        workspace_id: "{{ workspace_id }}"
        access: read
        state: present
      register: result_create

    - name: Set twa_id fact
      ansible.builtin.set_fact:
        twa_id: "{{ result_create.id }}"

    - name: Assert grant was created
      ansible.builtin.assert:
        that:
          - result_create.changed
          - result_create.id is defined
          - result_create.access == "read"
          - result_create.team_id == team_id
          - result_create.workspace_id == workspace_id

    # ------------------------------------------------------------------
    # 2. Idempotency — same params
    # ------------------------------------------------------------------
    - name: Re-grant same read access (idempotency check)
      hashicorp.terraform.team_workspace_access:
        team_id: "{{ team_id }}"
        workspace_id: "{{ workspace_id }}"
        access: read
        state: present
      register: result_idempotent

    - name: Assert idempotent — not changed AND full resource data returned
      ansible.builtin.assert:
        that:
          - not result_idempotent.changed
          - result_idempotent.id == twa_id
          - result_idempotent.access == "read"
          - result_idempotent.team_id == team_id
          - result_idempotent.workspace_id == workspace_id

    # ------------------------------------------------------------------
    # 3. Update to write access
    # ------------------------------------------------------------------
    - name: Update team access to write
      hashicorp.terraform.team_workspace_access:
        team_id: "{{ team_id }}"
        workspace_id: "{{ workspace_id }}"
        access: write
        state: present
      register: result_update

    - name: Assert access was updated
      ansible.builtin.assert:
        that:
          - result_update.changed
          - result_update.id == twa_id
          - result_update.access == "write"

    # ------------------------------------------------------------------
    # 4. Idempotency after update
    # ------------------------------------------------------------------
    - name: Re-update to write access (idempotency check)
      hashicorp.terraform.team_workspace_access:
        team_id: "{{ team_id }}"
        workspace_id: "{{ workspace_id }}"
        access: write
        state: present
      register: result_update_idem

    - name: Assert update idempotent — not changed AND full resource data returned
      ansible.builtin.assert:
        that:
          - not result_update_idem.changed
          - result_update_idem.id == twa_id
          - result_update_idem.access == "write"

    # ------------------------------------------------------------------
    # 5. Update directly by team_workspace_access_id
    # ------------------------------------------------------------------
    - name: Update access to admin using grant ID
      hashicorp.terraform.team_workspace_access:
        team_workspace_access_id: "{{ twa_id }}"
        access: admin
        state: present
      register: result_update_by_id

    - name: Assert update by ID was successful
      ansible.builtin.assert:
        that:
          - result_update_by_id.changed
          - result_update_by_id.id == twa_id
          - result_update_by_id.access == "admin"

    # ------------------------------------------------------------------
    # 6. Custom access type
    # ------------------------------------------------------------------
    - name: Grant custom access with fine-grained permissions
      hashicorp.terraform.team_workspace_access:
        team_id: "{{ team_id }}"
        workspace_id: "{{ workspace_id }}"
        access: custom
        runs: apply
        variables: write
        state_versions: read-outputs
        sentinel_mocks: none
        workspace_locking: true
        run_tasks: false
        policy_overrides: false
        state: present
      register: result_custom

    - name: Assert custom access was set
      ansible.builtin.assert:
        that:
          - result_custom.changed
          - result_custom.id == twa_id
          - result_custom.access == "custom"
          - result_custom.runs == "apply"
          - result_custom.variables == "write"
          - result_custom.workspace_locking == true

    - name: Re-grant same custom access (idempotency)
      hashicorp.terraform.team_workspace_access:
        team_id: "{{ team_id }}"
        workspace_id: "{{ workspace_id }}"
        access: custom
        runs: apply
        variables: write
        state_versions: read-outputs
        sentinel_mocks: none
        workspace_locking: true
        run_tasks: false
        policy_overrides: false
        state: present
      register: result_custom_idem

    - name: Assert custom access idempotent — full data returned
      ansible.builtin.assert:
        that:
          - not result_custom_idem.changed
          - result_custom_idem.id == twa_id
          - result_custom_idem.access == "custom"
          - result_custom_idem.runs == "apply"
          - result_custom_idem.workspace_locking == true

    # ------------------------------------------------------------------
    # 7. Remove the grant
    # ------------------------------------------------------------------
    - name: Remove team access grant
      hashicorp.terraform.team_workspace_access:
        team_id: "{{ team_id }}"
        workspace_id: "{{ workspace_id }}"
        state: absent
      register: result_delete

    - name: Assert grant was removed
      ansible.builtin.assert:
        that:
          - result_delete.changed
          - twa_id in result_delete.msg

    # ------------------------------------------------------------------
    # 8. Idempotency for absent
    # ------------------------------------------------------------------
    - name: Re-run absent (idempotency check)
      hashicorp.terraform.team_workspace_access:
        team_workspace_access_id: "{{ twa_id }}"
        state: absent
      register: result_delete_idem

    - name: Assert absent is idempotent
      ansible.builtin.assert:
        that:
          - not result_delete_idem.changed
          - "'not found' in result_delete_idem.msg"

  always:
    # ------------------------------------------------------------------
    # Cleanup: delete resources created for this test
    # ------------------------------------------------------------------
    - name: Delete test team workspace access grant
      when: twa_id is defined
      hashicorp.terraform.team_workspace_access:
        team_workspace_access_id: "{{ twa_id }}"
        state: absent
      register: cleanup_twa
      failed_when: >-
        cleanup_twa.failed | default(false)
        and 'not found' not in (cleanup_twa.msg | default('') | lower)

    - name: Delete test team
      when: team_id is defined or created_team_id is defined
      hashicorp.terraform.team:
        team_id: "{{ team_id | default(created_team_id) }}"
        state: absent
      register: cleanup_team
      failed_when: >-
        cleanup_team.failed | default(false)
        and 'not found' not in (cleanup_team.msg | default('') | lower)

    - name: Delete test workspace
      when: workspace_id is defined
      hashicorp.terraform.workspace:
        workspace_id: "{{ workspace_id }}"
        state: absent
      register: cleanup_workspace
      failed_when: >-
        cleanup_workspace.failed | default(false)
        and 'not found' not in (cleanup_workspace.msg | default('') | lower)
