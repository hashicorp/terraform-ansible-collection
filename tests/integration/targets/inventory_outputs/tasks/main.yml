---
- name: Set module defaults
  module_defaults:
    group/hashicorp.terraform.terraform:
      tf_token: "{{ tfc_token }}"

  block:
    # ── Setup ──────────────────────────────────────────────────────────────────

    - name: Generate unique workspace name
      ansible.builtin.set_fact:
        unique_id: "{{ lookup('pipe', 'uuidgen') }}"
        poll_interval: 10
        poll_timeout: 300

    - name: Set workspace name
      ansible.builtin.set_fact:
        workspace_name: "{{ unique_id }}-inv-outputs"

    - name: Create test workspace
      hashicorp.terraform.workspace:
        workspace: "{{ workspace_name }}"
        organization: "{{ organization }}"
        state: present
      register: workspace_result

    - name: Set workspace_id fact
      ansible.builtin.set_fact:
        workspace_id: "{{ workspace_result.id }}"

    - name: Create temporary directory for Terraform config
      ansible.builtin.tempfile:
        state: directory
      register: temp_dir

    - name: Render Terraform configuration
      ansible.builtin.template:
        src: main.tf.j2
        dest: "{{ temp_dir.path }}/main.tf"
        mode: "0644"

    - name: Upload configuration version
      hashicorp.terraform.configuration_version:
        workspace_id: "{{ workspace_id }}"
        configuration_files_path: "{{ temp_dir.path }}"
        auto_queue_runs: false
        poll_interval: "{{ poll_interval }}"
        poll_timeout: "{{ poll_timeout }}"
        state: present
      register: config_version_result

    - name: Assert upload succeeded
      ansible.builtin.assert:
        that:
          - config_version_result.changed
          - config_version_result.status == "uploaded"

    - name: Create and plan run
      hashicorp.terraform.run:
        workspace_id: "{{ workspace_id }}"
        run_message: "Integration test run for inventory_outputs"
        state: present
        configuration_version: "{{ config_version_result.id }}"
        poll: true
        poll_interval: "{{ poll_interval }}"
        poll_timeout: "{{ poll_timeout }}"
      register: plan_result

    - name: Apply run
      hashicorp.terraform.run:
        run_id: "{{ plan_result.id }}"
        state: applied
        poll: true
        poll_interval: "{{ poll_interval }}"
        poll_timeout: "{{ poll_timeout }}"
      register: apply_result

    - name: Assert apply succeeded
      ansible.builtin.assert:
        that:
          - apply_result.changed
          - apply_result.status == "applied"

    # ── Inventory test: list(object) output via hosts_from ────────────────────

    - name: Write inventory config for list(object) output
      ansible.builtin.copy:
        dest: "{{ temp_dir.path }}/inventory_list_object.terraform_inventory.yml"
        mode: "0644"
        content: |
          plugin: hashicorp.terraform.inventory
          source: outputs
          workspace_id: {{ workspace_id }}
          tfe_token: {{ tfc_token }}
          hosts_from:
            output: hosts_list
            type: list(object)
          hostnames:
            - name
          compose:
            ansible_host: server_ip

    - name: Run ansible-inventory for list(object) output
      ansible.builtin.shell: >-
        ansible-inventory
        -i "{{ temp_dir.path }}/inventory_list_object.terraform_inventory.yml"
        --list
        > "{{ temp_dir.path }}/inv_list_object.json"
      environment:
        PATH: "{{ lookup('env', 'PATH') }}"
        ANSIBLE_COLLECTIONS_PATHS: "{{ lookup('env', 'ANSIBLE_COLLECTIONS_PATHS') }}"
        TFE_TOKEN: "{{ tfc_token }}"
      changed_when: false

    - name: Debug raw inventory output (list object)
      ansible.builtin.debug:
        msg: "{{ lookup('file', temp_dir.path + '/inv_list_object.json') }}"

    - name: Load inventory JSON (list object)
      ansible.builtin.include_vars:
        file: "{{ temp_dir.path }}/inv_list_object.json"
        name: inv_list

    - name: Assert exactly 2 hosts from hosts_list output
      ansible.builtin.assert:
        that:
          - inv_list._meta.hostvars | length == 2
        fail_msg: >-
          Expected 2 hosts from hosts_list (list of objects).
          Got {{ inv_list._meta.hostvars | length }}: {{ inv_list._meta.hostvars.keys() | list }}

    - name: Assert hostnames start with 'host-' (from hostnames preference 'name')
      ansible.builtin.assert:
        that:
          - item.key is match('^host-')
        fail_msg: "Hostname '{{ item.key }}' does not start with 'host-' — expected name field used as hostname"
      loop: "{{ inv_list._meta.hostvars | dict2items }}"

    - name: Assert each host has server_ip and host_index vars
      ansible.builtin.assert:
        that:
          - item.value.server_ip is defined
          - item.value.server_ip is match('10\\.0\\.0\\.[0-9]+')
          - item.value.host_index is defined
        fail_msg: "Host {{ item.key }} missing expected variables — got: {{ item.value.keys() | list }}"
      loop: "{{ inv_list._meta.hostvars | dict2items }}"

    # ── Inventory test: scalar output via hosts_from ───────────────────────────

    - name: Write inventory config for scalar output
      ansible.builtin.copy:
        dest: "{{ temp_dir.path }}/inventory_scalar.terraform_inventory.yml"
        mode: "0644"
        content: |
          plugin: hashicorp.terraform.inventory
          source: outputs
          workspace_id: {{ workspace_id }}
          tfe_token: {{ tfc_token }}
          hosts_from:
            output: host_count
            type: number

    - name: Run ansible-inventory for scalar output
      ansible.builtin.shell: >-
        ansible-inventory
        -i "{{ temp_dir.path }}/inventory_scalar.terraform_inventory.yml"
        --list
        > "{{ temp_dir.path }}/inv_scalar.json"
      environment:
        ANSIBLE_COLLECTIONS_PATHS: "{{ lookup('env', 'ANSIBLE_COLLECTIONS_PATHS') }}"
      changed_when: false

    - name: Debug raw inventory output (scalar)
      ansible.builtin.debug:
        msg: "{{ lookup('file', temp_dir.path + '/inv_scalar.json') }}"

    - name: Load inventory JSON (scalar)
      ansible.builtin.include_vars:
        file: "{{ temp_dir.path }}/inv_scalar.json"
        name: inv_scalar

    - name: Assert exactly 1 host from scalar output
      ansible.builtin.assert:
        that:
          - inv_scalar._meta.hostvars | length == 1
        fail_msg: >-
          Expected 1 host from scalar output host_count.
          Got {{ inv_scalar._meta.hostvars | length }}: {{ inv_scalar._meta.hostvars.keys() | list }}

    - name: Assert scalar host has 'item' var equal to 2 (number of random_string resources)
      ansible.builtin.assert:
        that:
          - (inv_scalar._meta.hostvars.values() | first).item | int == 2
        fail_msg: >-
          Expected scalar host to have item=2.
          Got: {{ inv_scalar._meta.hostvars.values() | first }}

    # ── Inventory test: list(string) auto-ansible_host ────────────────────────
    # No `compose` is set, so the plugin auto-assigns ansible_host to each
    # primitive (the IP).

    - name: Write inventory config for list(string) output (auto ansible_host)
      ansible.builtin.copy:
        dest: "{{ temp_dir.path }}/inventory_list_string.terraform_inventory.yml"
        mode: "0644"
        content: |
          plugin: hashicorp.terraform.inventory
          source: outputs
          workspace_id: {{ workspace_id }}
          tfe_token: {{ tfc_token }}
          hosts_from:
            output: host_ips_list
            type: list(string)

    - name: Run ansible-inventory for list(string) output
      ansible.builtin.shell: >-
        ansible-inventory
        -i "{{ temp_dir.path }}/inventory_list_string.terraform_inventory.yml"
        --list
        > "{{ temp_dir.path }}/inv_list_string.json"
      environment:
        ANSIBLE_COLLECTIONS_PATHS: "{{ lookup('env', 'ANSIBLE_COLLECTIONS_PATHS') }}"
      changed_when: false

    - name: Load inventory JSON (list string)
      ansible.builtin.include_vars:
        file: "{{ temp_dir.path }}/inv_list_string.json"
        name: inv_list_string

    - name: Assert exactly 2 hosts and ansible_host auto-set to the IP
      ansible.builtin.assert:
        that:
          - inv_list_string._meta.hostvars | length == 2
          - item.value.item is match('10\\.0\\.0\\.[0-9]+')
          - item.value.ansible_host == item.value.item
        fail_msg: >-
          Expected list(string) hosts with ansible_host auto-set to the IP.
          Got {{ inv_list_string._meta.hostvars | length }} hosts: {{ inv_list_string._meta.hostvars }}
      loop: "{{ inv_list_string._meta.hostvars | dict2items }}"

    # ── Inventory test: map(object) reserved field collision ──────────────────
    # The Terraform output `bad_map_object` deliberately contains a reserved
    # 'item' field; the inventory build must fail with a clear error.

    - name: Write inventory config for map(object) collision case
      ansible.builtin.copy:
        dest: "{{ temp_dir.path }}/inventory_collision.terraform_inventory.yml"
        mode: "0644"
        content: |
          plugin: hashicorp.terraform.inventory
          source: outputs
          workspace_id: {{ workspace_id }}
          tfe_token: {{ tfc_token }}
          hosts_from:
            output: bad_map_object
            type: map(object)

    - name: Run ansible-inventory for collision case (expected to fail)
      ansible.builtin.shell: >-
        ansible-inventory
        -i "{{ temp_dir.path }}/inventory_collision.terraform_inventory.yml"
        --list
      environment:
        ANSIBLE_COLLECTIONS_PATHS: "{{ lookup('env', 'ANSIBLE_COLLECTIONS_PATHS') }}"
      register: collision_result
      changed_when: false
      failed_when: false

    - name: Assert collision build failed with the documented message
      ansible.builtin.assert:
        that:
          - collision_result.rc != 0
          - "'reserved field' in collision_result.stderr"
          - "'bad_map_object' in collision_result.stderr"
        fail_msg: >-
          Expected ansible-inventory to fail with a 'reserved field' error
          on bad_map_object. Got rc={{ collision_result.rc }},
          stderr={{ collision_result.stderr }}

    # ── Inventory test: auto-detection (no hosts_from) ────────────────────────
    # hosts_list is a list(object) — auto-detection should discover these hosts.

    - name: Write inventory config using auto-detection (no hosts_from)
      ansible.builtin.copy:
        dest: "{{ temp_dir.path }}/inventory_auto.terraform_inventory.yml"
        mode: "0644"
        content: |
          plugin: hashicorp.terraform.inventory
          source: outputs
          workspace_id: {{ workspace_id }}
          tfe_token: {{ tfc_token }}

    - name: Run ansible-inventory with auto-detection
      ansible.builtin.shell: >-
        ansible-inventory
        -i "{{ temp_dir.path }}/inventory_auto.terraform_inventory.yml"
        --list
        > "{{ temp_dir.path }}/inv_auto.json"
      environment:
        ANSIBLE_COLLECTIONS_PATHS: "{{ lookup('env', 'ANSIBLE_COLLECTIONS_PATHS') }}"
      changed_when: false

    - name: Debug raw inventory output (auto-detection)
      ansible.builtin.debug:
        msg: "{{ lookup('file', temp_dir.path + '/inv_auto.json') }}"

    - name: Load inventory JSON (auto-detection)
      ansible.builtin.include_vars:
        file: "{{ temp_dir.path }}/inv_auto.json"
        name: inv_auto

    - name: Assert auto-detection finds 2 hosts from list(object) output
      ansible.builtin.assert:
        that:
          - inv_auto._meta.hostvars | length == 2
        fail_msg: >-
          Expected 2 hosts via auto-detection (list of objects).
          Got {{ inv_auto._meta.hostvars | length }}: {{ inv_auto._meta.hostvars.keys() | list }}

  always:
    # ── Cleanup ────────────────────────────────────────────────────────────────

    - name: Create destroy run
      hashicorp.terraform.run:
        workspace_id: "{{ workspace_id }}"
        run_message: "Destroy run — inventory_outputs cleanup"
        state: present
        is_destroy: true
        poll: true
        poll_interval: "{{ poll_interval }}"
        poll_timeout: "{{ poll_timeout }}"
      when: workspace_id is defined
      register: destroy_run
      failed_when: false

    - name: Apply destroy run
      hashicorp.terraform.run:
        run_id: "{{ destroy_run.id }}"
        state: applied
        poll: true
        poll_interval: "{{ poll_interval }}"
        poll_timeout: "{{ poll_timeout }}"
      when: destroy_run.id is defined
      failed_when: false

    - name: Force unlock workspace
      hashicorp.terraform.workspace:
        workspace_id: "{{ workspace_id }}"
        state: unlocked
        force: true
      when: workspace_id is defined
      failed_when: false

    - name: Delete test workspace
      hashicorp.terraform.workspace:
        workspace_id: "{{ workspace_id }}"
        state: absent
        force: true
      when: workspace_id is defined
      failed_when: false

    - name: Remove temporary directory
      ansible.builtin.file:
        path: "{{ temp_dir.path }}"
        state: absent
      when: temp_dir.path is defined
      failed_when: false
