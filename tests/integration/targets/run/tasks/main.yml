---
- name: Set module defaults
  module_defaults:
    group/hashicorp.terraform.terraform:
      tf_token: "{{ tfc_token }}"

  block:
    - name: Generate a unique ID
      ansible.builtin.set_fact:
        unique_id: "{{ lookup('pipe', 'uuidgen') }}"
        poll_interval: 10
        poll_timeout: 600

    - name: Generate unique workspace name
      ansible.builtin.set_fact:
        workspace_name: "{{ unique_id }}-workspace"

    - name: Create a Terraform workspace with unique name
      ansible.builtin.uri:
        url: "https://app.terraform.io/api/v2/organizations/{{ organization }}/workspaces"
        method: POST
        headers:
          Authorization: "Bearer {{ tfc_token }}"
          Content-Type: "application/vnd.api+json"
        body_format: json
        body:
          data:
            attributes:
              name: "{{ workspace_name }}"
            type: "workspaces"
        return_content: true
        status_code: 201
      no_log: true
      register: workspace_create_response

    - name: Set a fact for 'workspace_id'
      ansible.builtin.set_fact:
        workspace_id: "{{ workspace_create_response.json.data.id }}"

    - name: Create temporary directory to store main.tf configuration
      ansible.builtin.tempfile:
        state: directory
      register: temp_dir

    - name: Generate Terraform configuration
      ansible.builtin.template:
        src: "main.tf.j2"
        dest: "{{ temp_dir.path }}/main.tf"
        mode: "0644"

    - name: Create configuration version with auto_queue_runs to false
      hashicorp.terraform.configuration_version:
        workspace_id: "{{ workspace_id }}"
        configuration_files_path: "{{ temp_dir.path }}"
        auto_queue_runs: false
        tf_validate_certs: true
        poll_interval: "{{ poll_interval }}"
        poll_timeout: "{{ poll_timeout }}"
        state: present
      register: result

    - name: Assert create and upload success
      ansible.builtin.assert:
        that:
          - result.changed
          - result.attributes.status == "uploaded"

    - name: Create a plan only run with variables
      hashicorp.terraform.run:
        workspace_id: "{{ workspace_id }}"
        run_message: "plan-only vpc creation"
        poll: false
        state: "present"
        tf_token: "{{ tfc_token }}"
        plan_only: true
        variables:
          - key: "env"
            value: "production"
          - key: "db_name"
            value: "terraform_test"
      register: result_plan_only_variables

    - name: Assert plan only run with variables is result.changed
      ansible.builtin.assert:
        that:
          - result_plan_only_variables.changed
          - result_plan_only_variables.attributes.variables != []

    - name: Create a destroy run with auto_apply
      hashicorp.terraform.run:
        workspace_id: "{{ workspace_id }}"
        run_message: "destroy vpc"
        state: "present"
        tf_token: "{{ tfc_token }}"
        is_destroy: true
        auto_apply: true
        poll: true
        poll_interval: "{{ poll_interval }}"
        poll_timeout: "{{ poll_timeout }}"
      register: result_destroy

    - name: Assert destroy run is result.changed
      ansible.builtin.assert:
        that:
          - result_destroy.changed
          - result_destroy.attributes.status != "errored"

    - name: Create a save plan run
      hashicorp.terraform.run:
        workspace_id: "{{ workspace_id }}"
        run_message: "save plan vpc creation"
        state: "present"
        tf_token: "{{ tfc_token }}"
        poll: true
        poll_interval: "{{ poll_interval }}"
        poll_timeout: "{{ poll_timeout }}"
        save_plan: true
      register: result_save_plan

    - name: Assert save plan run was created
      ansible.builtin.assert:
        that:
          - result_save_plan.changed

    - name: Apply the save plan run
      hashicorp.terraform.run: &apply_save_plan
        run_id: "{{ result_save_plan.id }}"
        state: "applied"
        tf_token: "{{ tfc_token }}"
        poll: true
        poll_interval: "{{ poll_interval }}"
        poll_timeout: "{{ poll_timeout }}"
      register: result_apply_save_plan

    - name: Assert save plan run was applied
      ansible.builtin.assert:
        that:
          - result_apply_save_plan.changed

    - name: Idempotent check for apply save plan
      hashicorp.terraform.run: *apply_save_plan
      register: result_apply_save_plan_idempotent

    - name: Assert idempotence for apply save plan
      ansible.builtin.assert:
        that:
          - not result_apply_save_plan_idempotent.changed

    - name: Create an auto_apply run
      hashicorp.terraform.run:
        workspace_id: "{{ workspace_id }}"
        run_message: "auto_apply vpc creation"
        state: "present"
        tf_token: "{{ tfc_token }}"
        auto_apply: true
        poll: false
      register: result_auto_apply

    - name: Cancel the auto_apply run in check mode
      hashicorp.terraform.run:
        run_id: "{{ result_auto_apply.id }}"
        state: "canceled"
        tf_token: "{{ tfc_token }}"
        poll: false
      check_mode: true
      register: check_mode_cancel_auto_apply_result

    - name: Assert auto_apply run was canceled in check mode
      ansible.builtin.assert:
        that:
          - check_mode_cancel_auto_apply_result.changed
          - check_mode_cancel_auto_apply_result.msg == ("Run " + result_auto_apply.id + " found, check mode is enabled, no changes will be made")

    - name: Cancel the auto_apply run
      hashicorp.terraform.run: &cancel_auto_apply
        run_id: "{{ result_auto_apply.id }}"
        state: "canceled"
        tf_token: "{{ tfc_token }}"
      register: result_cancel_auto_apply

    - name: Assert auto_apply run was canceled
      ansible.builtin.assert:
        that:
          - result_cancel_auto_apply.changed
          - result_cancel_auto_apply.attributes.status == "canceled"

    - name: Idempotent check for cancel auto_apply
      hashicorp.terraform.run: *cancel_auto_apply
      register: result_cancel_auto_apply_idempotent

    - name: Assert idempotence for cancel auto_apply
      ansible.builtin.assert:
        that:
          - not result_cancel_auto_apply_idempotent.changed

    - name: Create a is_destroy and auto_apply run
      hashicorp.terraform.run:
        workspace_id: "{{ workspace_id }}"
        run_message: "destroy vpc"
        state: "present"
        tf_token: "{{ tfc_token }}"
        is_destroy: true
        auto_apply: true
        poll: true
        poll_interval: "{{ poll_interval }}"
        poll_timeout: "{{ poll_timeout }}"
        target_addrs:
          - "aws_vpc.vpc1-{{ unique_id }}"
          - "aws_vpc.vpc2-{{ unique_id }}"
      register: result_is_destroy_auto_apply

    - name: Assert is_destroy and auto_apply run is result.changed
      ansible.builtin.assert:
        that:
          - result_is_destroy_auto_apply.changed

    - name: Discard invalid run in check mode
      hashicorp.terraform.run:
        run_id: "run-1234abcd"
        state: "discarded"
        tf_token: "{{ tfc_token }}"
      check_mode: true
      ignore_errors: true
      register: check_mode_discard_invalid_result

    - name: Assert invalid run was discarded in check mode
      ansible.builtin.assert:
        that:
          - check_mode_discard_invalid_result.msg == "Run run-1234abcd not found in the Terraform Cloud/Enterprise workspace"

    - name: Apply invalid run in check mode
      hashicorp.terraform.run:
        run_id: "run-5678efgh"
        state: "applied"
        tf_token: "{{ tfc_token }}"
      check_mode: true
      ignore_errors: true
      register: check_mode_apply_invalid_result

    - name: Assert invalid run was applied in check mode
      ansible.builtin.assert:
        that:
          - check_mode_apply_invalid_result.msg == "Run run-5678efgh not found in the Terraform Cloud/Enterprise workspace"

    - name: Cancel valid run in check mode
      hashicorp.terraform.run:
        run_id: "run-1234abcd"
        state: "canceled"
        tf_token: "{{ tfc_token }}"
      check_mode: true
      ignore_errors: true
      register: check_mode_cancel_valid_result

    - name: Assert valid run was canceled in check mode
      ansible.builtin.assert:
        that:
          - check_mode_cancel_valid_result.msg == "Run run-1234abcd not found in the Terraform Cloud/Enterprise workspace"

  always:
    - name: Force delete workspace
      ansible.builtin.uri:
        url: "https://app.terraform.io/api/v2/workspaces/{{ workspace_id }}"
        method: DELETE
        headers:
          Authorization: "Bearer {{ tfc_token }}"
          Content-Type: "application/vnd.api+json"
        status_code: 204
        return_content: true
      no_log: true
      register: workspace_delete_response

    - name: Clean up rendered config directory
      ansible.builtin.file:
        path: "{{ temp_dir.path }}"
        state: absent
