---
- name: Set module defaults
  module_defaults:
    group/hashicorp.terraform.terraform:
      tf_token: "{{ tfc_token }}"

  block:
    # ── Setup ──────────────────────────────────────────────────────────────────

    - name: Generate unique workspace name
      ansible.builtin.set_fact:
        unique_id: "{{ lookup('pipe', 'uuidgen') }}"
        poll_interval: 10
        poll_timeout: 300

    - name: Set workspace name
      ansible.builtin.set_fact:
        workspace_name: "{{ unique_id }}-inv-statefile"

    - name: Create test workspace
      hashicorp.terraform.workspace:
        workspace: "{{ workspace_name }}"
        organization: "{{ organization }}"
        state: present
      register: workspace_result

    - name: Set workspace_id fact
      ansible.builtin.set_fact:
        workspace_id: "{{ workspace_result.id }}"

    - name: Create temporary directory for Terraform config
      ansible.builtin.tempfile:
        state: directory
      register: temp_dir

    - name: Render Terraform configuration
      ansible.builtin.template:
        src: main.tf.j2
        dest: "{{ temp_dir.path }}/main.tf"
        mode: "0644"

    - name: Upload configuration version
      hashicorp.terraform.configuration_version:
        workspace_id: "{{ workspace_id }}"
        configuration_files_path: "{{ temp_dir.path }}"
        auto_queue_runs: false
        poll_interval: "{{ poll_interval }}"
        poll_timeout: "{{ poll_timeout }}"
        state: present
      register: config_version_result

    - name: Assert upload succeeded
      ansible.builtin.assert:
        that:
          - config_version_result.changed
          - config_version_result.status == "uploaded"

    - name: Create and plan run
      hashicorp.terraform.run:
        workspace_id: "{{ workspace_id }}"
        run_message: "Integration test run for inventory_statefile"
        state: present
        configuration_version: "{{ config_version_result.id }}"
        poll: true
        poll_interval: "{{ poll_interval }}"
        poll_timeout: "{{ poll_timeout }}"
      register: plan_result

    - name: Apply run
      hashicorp.terraform.run:
        run_id: "{{ plan_result.id }}"
        state: applied
        poll: true
        poll_interval: "{{ poll_interval }}"
        poll_timeout: "{{ poll_timeout }}"
      register: apply_result

    - name: Assert apply succeeded
      ansible.builtin.assert:
        that:
          - apply_result.changed
          - apply_result.status == "applied"

    # ── Inventory test: with provider_mapping (null_resource included) ─────────

    - name: Write inventory config with provider_mapping
      ansible.builtin.copy:
        dest: "{{ temp_dir.path }}/inventory_with_mapping.terraform_inventory.yml"
        mode: "0644"
        content: |
          plugin: hashicorp.terraform.inventory
          source: statefile
          workspace_id: {{ workspace_id }}
          tfe_token: {{ tfc_token }}
          provider_mapping:
            - provider_name: registry.terraform.io/hashicorp/null
              types:
                - null_resource
          hostnames:
            - triggers.host_id
          compose:
            ansible_host: triggers.server_ip
            env: triggers.env

    - name: Run ansible-inventory with provider_mapping
      ansible.builtin.command:
        argv:
          - ansible-inventory
          - -i
          - "{{ temp_dir.path }}/inventory_with_mapping.terraform_inventory.yml"
          - --list
      register: inv_with_mapping
      environment:
        ANSIBLE_COLLECTIONS_PATHS: "{{ lookup('env', 'ANSIBLE_COLLECTIONS_PATHS') }}"

    - name: Parse inventory JSON (with mapping)
      ansible.builtin.set_fact:
        inv_data: "{{ (inv_with_mapping.stdout | string) | from_json }}"

    - name: Assert 2 hosts discovered via provider_mapping
      ansible.builtin.assert:
        that:
          - inv_data._meta.hostvars | length == 2
        fail_msg: >-
          Expected 2 null_resource hosts with provider_mapping.
          Got {{ inv_data._meta.hostvars | length }} hosts: {{ inv_data._meta.hostvars.keys() | list }}

    - name: Assert each host has triggers.server_ip
      ansible.builtin.assert:
        that:
          - item.value['triggers'] is defined
          - item.value['triggers']['server_ip'] is defined
          - item.value['triggers']['server_ip'] is match('10\\.0\\.0\\.[0-9]+')
        fail_msg: "Host {{ item.key }} missing triggers.server_ip — got hostvars: {{ item.value }}"
      loop: "{{ inv_data._meta.hostvars | dict2items }}"

    - name: Assert all hosts are in the 'all' group
      ansible.builtin.assert:
        that:
          - inv_data.all.hosts | default(inv_data.all.children | default([])) | length > 0
            or inv_data._meta.hostvars | length == 2
        fail_msg: "No hosts found in 'all' group"

    # ── Inventory test: without provider_mapping (null_resource filtered out) ──

    - name: Write inventory config without provider_mapping
      ansible.builtin.copy:
        dest: "{{ temp_dir.path }}/inventory_no_mapping.terraform_inventory.yml"
        mode: "0644"
        content: |
          plugin: hashicorp.terraform.inventory
          source: statefile
          workspace_id: {{ workspace_id }}
          tfe_token: {{ tfc_token }}

    - name: Run ansible-inventory without provider_mapping
      ansible.builtin.command:
        argv:
          - ansible-inventory
          - -i
          - "{{ temp_dir.path }}/inventory_no_mapping.terraform_inventory.yml"
          - --list
      register: inv_no_mapping
      environment:
        ANSIBLE_COLLECTIONS_PATHS: "{{ lookup('env', 'ANSIBLE_COLLECTIONS_PATHS') }}"

    - name: Parse inventory JSON (no mapping)
      ansible.builtin.set_fact:
        inv_no_map_data: "{{ (inv_no_mapping.stdout | string) | from_json }}"

    - name: Assert 0 hosts without provider_mapping (null_resource is not in default whitelist)
      ansible.builtin.assert:
        that:
          - inv_no_map_data._meta.hostvars | length == 0
        fail_msg: >-
          Expected 0 hosts without provider_mapping (null_resource is filtered by default).
          Got {{ inv_no_map_data._meta.hostvars | length }} host(s): {{ inv_no_map_data._meta.hostvars.keys() | list }}

  always:
    # ── Cleanup ────────────────────────────────────────────────────────────────

    - name: Create destroy run
      hashicorp.terraform.run:
        workspace_id: "{{ workspace_id }}"
        run_message: "Destroy run — inventory_statefile cleanup"
        state: present
        is_destroy: true
        poll: true
        poll_interval: "{{ poll_interval }}"
        poll_timeout: "{{ poll_timeout }}"
      when: workspace_id is defined
      register: destroy_run
      failed_when: false

    - name: Apply destroy run
      hashicorp.terraform.run:
        run_id: "{{ destroy_run.id }}"
        state: applied
        poll: true
        poll_interval: "{{ poll_interval }}"
        poll_timeout: "{{ poll_timeout }}"
      when: destroy_run.id is defined
      failed_when: false

    - name: Force unlock workspace
      hashicorp.terraform.workspace:
        workspace_id: "{{ workspace_id }}"
        state: unlocked
        force: true
      when: workspace_id is defined
      failed_when: false

    - name: Delete test workspace
      hashicorp.terraform.workspace:
        workspace_id: "{{ workspace_id }}"
        state: absent
        force: true
      when: workspace_id is defined
      failed_when: false

    - name: Remove temporary directory
      ansible.builtin.file:
        path: "{{ temp_dir.path }}"
        state: absent
      when: temp_dir.path is defined
      failed_when: false
