---
- name: Set module defaults
  module_defaults:
    group/hashicorp.terraform.terraform:
      tfe_token: "{{ tfc_token }}"

  block:
    - name: Generate unique suffix
      ansible.builtin.set_fact:
        suffix: "{{ lookup('pipe', 'uuidgen')[:8] | lower }}"

    - name: Set fact for resource names
      ansible.builtin.set_fact:
        tag_name: "tag-{{ suffix }}"
        workspace_a: "tag-ws-a-{{ suffix }}"
        workspace_b: "tag-ws-b-{{ suffix }}"

    - name: Create two supporting workspaces
      hashicorp.terraform.workspace:
        organization: "{{ organization }}"
        workspace: "{{ item }}"
        execution_mode: remote
        description: "integration workspace for organization_tags tests"
        state: present
      loop:
        - "{{ workspace_a }}"
        - "{{ workspace_b }}"
      register: workspace_create

    - name: Pin workspace IDs
      ansible.builtin.set_fact:
        ws_a_id: "{{ workspace_create.results[0].id }}"
        ws_b_id: "{{ workspace_create.results[1].id }}"

    # ---------- present: create tag by name and associate ws_a ----------
    - name: Create tag by name and associate ws_a
      hashicorp.terraform.organization_tags:
        organization: "{{ organization }}"
        name: "{{ tag_name }}"
        workspace_ids:
          - "{{ ws_a_id }}"
        state: present
      register: result_create

    - name: Assert tag was created and ws_a was associated
      ansible.builtin.assert:
        that:
          - result_create.changed
          - result_create.id is defined
          - result_create.name == tag_name
        fail_msg: "Expected tag '{{ tag_name }}' to be created with changed=True"

    - name: Pin the resolved tag ID
      ansible.builtin.set_fact:
        tag_id: "{{ result_create.id }}"

    # ---------- present (name-based idempotency) ----------
    - name: Create same tag by name again (idempotency)
      hashicorp.terraform.organization_tags:
        organization: "{{ organization }}"
        name: "{{ tag_name }}"
        workspace_ids:
          - "{{ ws_a_id }}"
        state: present
      register: result_create_again

    - name: Assert name-based re-create is a no-op
      ansible.builtin.assert:
        that:
          - not result_create_again.changed
          - result_create_again.workspace_ids | length == 0
        fail_msg: "Re-creating an already-existing tag+workspace association must not report changed"

    # ---------- present: associate ws_b using tag_id ----------
    - name: Associate ws_b with the tag (by tag_id)
      hashicorp.terraform.organization_tags:
        organization: "{{ organization }}"
        tag_id: "{{ tag_id }}"
        workspace_ids:
          - "{{ ws_b_id }}"
        state: present
      register: result_associate

    - name: Assert association was successful
      ansible.builtin.assert:
        that:
          - result_associate.changed
          - ws_b_id in result_associate.workspace_ids
          - result_associate.id == tag_id

    # ---------- present (tag_id-based idempotency) ----------
    - name: Associate ws_b again (idempotency)
      hashicorp.terraform.organization_tags:
        organization: "{{ organization }}"
        tag_id: "{{ tag_id }}"
        workspace_ids:
          - "{{ ws_b_id }}"
        state: present
      register: result_associate_again

    - name: Assert re-association is a no-op
      ansible.builtin.assert:
        that:
          - not result_associate_again.changed
          - result_associate_again.workspace_ids | length == 0
        fail_msg: "Re-association of an already-associated workspace must not report changed"

    # ---------- check-mode absent: verify the tag is not actually deleted ----------
    - name: Check-mode delete of the tag (must not mutate)
      hashicorp.terraform.organization_tags:
        organization: "{{ organization }}"
        tag_id: "{{ tag_id }}"
        state: absent
      check_mode: true
      register: result_check_delete

    - name: Assert check-mode reports a would-be change
      ansible.builtin.assert:
        that:
          - result_check_delete.changed
          - "'check mode' in result_check_delete.msg"

    # ---------- lookup: verify tag appears in org-level list ----------
    - name: List all org tags via lookup
      ansible.builtin.set_fact:
        org_tags_lookup: "{{ lookup('hashicorp.terraform.tf_org_tags', organization=organization, tfe_token=tfc_token) }}"

    - name: Assert our tag is present in the lookup results
      ansible.builtin.assert:
        that:
          - org_tags_lookup | selectattr('id', 'equalto', tag_id) | list | length == 1
          - (org_tags_lookup | selectattr('id', 'equalto', tag_id) | list)[0].name == tag_name
        fail_msg: "Tag {{ tag_id }} ({{ tag_name }}) not found in tf_org_tags lookup results"

    # ---------- lookup: query filter ----------
    - name: List org tags filtered by name query
      ansible.builtin.set_fact:
        queried_tags: "{{ lookup('hashicorp.terraform.tf_org_tags', organization=organization,
                                  query=tag_name, tfe_token=tfc_token) }}"

    # ---------- lookup: filter_exclude_taggable_id ----------
    - name: List org tags excluding tags already on ws_a
      ansible.builtin.set_fact:
        excluded_tags: "{{ lookup('hashicorp.terraform.tf_org_tags', organization=organization,
                                   filter_exclude_taggable_id=ws_a_id, tfe_token=tfc_token) }}"

    # ---------- absent: delete the tag ----------
    - name: Delete the tag
      hashicorp.terraform.organization_tags:
        organization: "{{ organization }}"
        tag_id: "{{ tag_id }}"
        state: absent
      register: result_delete

    - name: Assert delete was successful
      ansible.builtin.assert:
        that:
          - result_delete.changed
          - tag_id in result_delete.ids
          - "'deleted successfully' in result_delete.msg"

    # ---------- absent (idempotency) ----------
    - name: Delete the tag again (idempotency)
      hashicorp.terraform.organization_tags:
        organization: "{{ organization }}"
        tag_id: "{{ tag_id }}"
        state: absent
      register: result_delete_again

    - name: Assert repeated delete is a no-op
      ansible.builtin.assert:
        that:
          - not result_delete_again.changed
          - "'absent' in result_delete_again.msg"
        fail_msg: "Deleting an already-absent tag must not report changed"

  always:
    - name: Cleanup - delete tag if still present
      hashicorp.terraform.organization_tags:
        organization: "{{ organization }}"
        tag_id: "{{ tag_id }}"
        state: absent
      when: tag_id is defined
      failed_when: false

    - name: Cleanup - delete supporting workspaces
      hashicorp.terraform.workspace:
        organization: "{{ organization }}"
        workspace: "{{ item }}"
        state: absent
      loop:
        - "{{ workspace_a }}"
        - "{{ workspace_b }}"
      when: workspace_a is defined
      failed_when: false
