---
- name: Set values
  ansible.builtin.set_fact:
    tfc_token: "{{ tfc_token | default(lookup('ansible.builtin.env', 'TFC_CI_TOKEN')) }}"
    organization: "{{ organization | default(lookup('ansible.builtin.env', 'TFC_CI_ORGANIZATION') | default('ANSIBLE-ENGINEERING-CI', true)) }}"
  no_log: true
