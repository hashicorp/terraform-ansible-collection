---
- name: Set module defaults for membership tests
  module_defaults:
    group/hashicorp.terraform.terraform:
      tfe_token: "{{ tfc_token }}"

  block:

    - name: Create test team for membership operations
      hashicorp.terraform.team:
        tfe_token: "{{ tfc_token }}"
        name: "membership-test-team-{{ ansible_date_time.epoch }}"
        organization: "{{ organization }}"
        visibility: "secret"
        state: present
      register: membership_team_result

    - name: Set membership team facts
      ansible.builtin.set_fact:
        membership_team_id: "{{ membership_team_result.id }}"

    - name: Verify membership team created
      ansible.builtin.assert:
        that:
          - membership_team_result.changed
          - membership_team_result.id is defined
        fail_msg: "Failed to create membership test team"

    - name: Get membership test team info
      hashicorp.terraform.team_info:
        tfe_token: "{{ tfc_token }}"
        team_id: "{{ membership_team_id }}"
      register: team_members_result

    - name: Verify membership info retrieval
      ansible.builtin.assert:
        that:
          - team_members_result.team.id == membership_team_id
        fail_msg: "Failed to retrieve team membership info"

  always:

    - name: Delete membership test team
      hashicorp.terraform.team:
        tfe_token: "{{ tfc_token }}"
        team_id: "{{ membership_team_id }}"
        state: absent
      register: membership_team_delete
      when: membership_team_id is defined
      ignore_errors: true

    - name: Verify membership team deleted
      ansible.builtin.assert:
        that:
          - membership_team_delete.changed
        fail_msg: "Failed to delete membership test team"
      when:
        - membership_team_delete is defined
        - not membership_team_delete.skipped | default(false)
