---
- name: Set module defaults
  module_defaults:
    group/hashicorp.terraform.terraform:
      tf_token: "{{ tfc_token }}"

  block:
    - name: Generate a unique ID
      ansible.builtin.set_fact:
        unique_id: "{{ lookup('pipe', 'uuidgen') }}"

    - name: Generate unique workspace name
      ansible.builtin.set_fact:
        workspace_name: "{{ unique_id }}-workspace"

    - name: Create a Terraform workspace with unique name
      hashicorp.terraform.workspace:
        workspace: "{{ workspace_name }}"
        organization: "{{ organization }}"
        state: present
      register: workspace_create_response

    - name: Debug workspace creation response
      ansible.builtin.debug:
        var: workspace_create_response

    - name: Set a fact for 'workspace_id'
      ansible.builtin.set_fact:
        workspace_id: "{{ workspace_create_response.id }}"

    - name: Wait a moment for workspace to be fully created
      ansible.builtin.pause:
        seconds: 2

    # Test retrieving workspace info by ID using existing workspace
    - name: Get workspace info by ID
      hashicorp.terraform.workspace_info:
        workspace_id: "{{ workspace_id }}"
        tf_token: "{{ tfc_token }}"
      register: result_by_id

    - name: Debug - Show what was actually returned
      ansible.builtin.debug:
        var: result_by_id

    - name: Debug - Show workspace_id value
      ansible.builtin.debug:
        var: workspace_id

    - name: Assert workspace info retrieval by ID success
      ansible.builtin.assert:
        that:
          - not result_by_id.changed
          - result_by_id.workspace.id == workspace_id
          - result_by_id.workspace.name is defined
          - '"status" not in result_by_id.workspace'

    # Test retrieving workspace info by name and organization
    - name: Get workspace info by name and organization
      hashicorp.terraform.workspace_info:
        workspace: "{{ workspace_name }}"
        organization: "{{ organization }}"
      register: result_by_name

    - name: Assert workspace info retrieval by name success
      ansible.builtin.assert:
        that:
          - not result_by_name.changed
          - result_by_name.workspace.id == workspace_id
          - result_by_name.workspace.name == workspace_name
          - '"status" not in result_by_name.workspace'

    # Test that both methods return the same result
    - name: Assert both methods return identical workspace data
      ansible.builtin.assert:
        that:
          - result_by_id.workspace == result_by_name.workspace

    # Test error handling - invalid workspace ID
    - name: Test invalid workspace ID
      hashicorp.terraform.workspace_info:
        workspace_id: "ws-invalid-workspace-id"
      register: result_invalid_id
      ignore_errors: true

    - name: Assert invalid workspace ID fails appropriately
      ansible.builtin.assert:
        that:
          - result_invalid_id.failed
          - '"not found" in result_invalid_id.msg'

    # Test error handling - invalid workspace name
    - name: Test invalid workspace name
      hashicorp.terraform.workspace_info:
        workspace: "nonexistent-workspace-name"
        organization: "{{ organization }}"
      register: result_invalid_name
      ignore_errors: true

    - name: Assert invalid workspace name fails appropriately
      ansible.builtin.assert:
        that:
          - result_invalid_name.failed
          - '"not found" in result_invalid_name.msg'
          - '"nonexistent-workspace-name" in result_invalid_name.msg'

    # Test error handling - invalid organization
    - name: Test invalid organization
      hashicorp.terraform.workspace_info:
        workspace: "{{ workspace_name }}"
        organization: "nonexistent-organization"
      register: result_invalid_org
      ignore_errors: true

    - name: Assert invalid organization fails appropriately
      ansible.builtin.assert:
        that:
          - result_invalid_org.failed
          - '"not found" in result_invalid_org.msg'

    # Test case 3: Workspace ID, name and org name are given - should fail
    - name: Test workspace ID with name and organization (invalid combination)
      hashicorp.terraform.workspace_info:
        workspace_id: "{{ workspace_id }}"
        workspace: "{{ workspace_name }}"
        organization: "{{ organization }}"
      register: result_id_name_org
      ignore_errors: true

    - name: Assert workspace ID with name and organization fails
      ansible.builtin.assert:
        that:
          - result_id_name_org.failed
          - '"mutually exclusive" in result_id_name_org.msg or "invalid combination" in result_id_name_org.msg'

    # Test case 4: Workspace ID and org name are given - should fail
    - name: Test workspace ID with organization (invalid combination)
      hashicorp.terraform.workspace_info:
        workspace_id: "{{ workspace_id }}"
        organization: "{{ organization }}"
      register: result_id_org
      ignore_errors: true

    - name: Assert workspace ID with organization fails
      ansible.builtin.assert:
        that:
          - result_id_org.failed
          - '"mutually exclusive" in result_id_org.msg or "invalid combination" in result_id_org.msg'

    # Test case 5: Workspace ID and name are given - should fail
    - name: Test workspace ID with name (invalid combination)
      hashicorp.terraform.workspace_info:
        workspace_id: "{{ workspace_id }}"
        workspace: "{{ workspace_name }}"
      register: result_id_name
      ignore_errors: true

    - name: Assert workspace ID with name fails
      ansible.builtin.assert:
        that:
          - result_id_name.failed
          - '"mutually exclusive" in result_id_name.msg or "invalid combination" in result_id_name.msg'

    # Test case 6: Only workspace name is given - should fail
    - name: Test only workspace name (missing organization)
      hashicorp.terraform.workspace_info:
        workspace: "{{ workspace_name }}"
      register: result_name_only
      ignore_errors: true

    - name: Assert only workspace name fails
      ansible.builtin.assert:
        that:
          - result_name_only.failed
          - >-
            "parameters are required together" in result_name_only.msg or
            "organization is required" in result_name_only.msg or
            "missing required" in result_name_only.msg

    # Test case 7: Only org name is given - should fail
    - name: Test only organization (missing workspace)
      hashicorp.terraform.workspace_info:
        organization: "{{ organization }}"
      register: result_org_only
      ignore_errors: true

    - name: Assert only organization fails
      ansible.builtin.assert:
        that:
          - result_org_only.failed
          - >-
            "parameters are required together" in result_org_only.msg or
            "workspace is required" in result_org_only.msg or
            "missing required" in result_org_only.msg

    # Test check mode with workspace ID
    - name: Test check mode with workspace ID
      hashicorp.terraform.workspace_info:
        workspace_id: "{{ workspace_id }}"
      check_mode: true
      register: result_check_mode_id

    - name: Assert check mode works correctly with workspace ID
      ansible.builtin.assert:
        that:
          - not result_check_mode_id.changed
          - result_check_mode_id.workspace.id == workspace_id
          - result_check_mode_id.workspace.name == workspace_name

    # Test check mode with workspace name
    - name: Test check mode with workspace name
      hashicorp.terraform.workspace_info:
        workspace: "{{ workspace_name }}"
        organization: "{{ organization }}"
      check_mode: true
      register: result_check_mode_name

    - name: Assert check mode works correctly with workspace name
      ansible.builtin.assert:
        that:
          - not result_check_mode_name.changed
          - result_check_mode_name.workspace.id == workspace_id
          - result_check_mode_name.workspace.name == workspace_name
  always:
    - name: Force delete workspace
      hashicorp.terraform.workspace:
        workspace_id: "{{ workspace_id }}"
        state: absent
        force: true
      failed_when: false
