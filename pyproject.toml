[tool.black]
line-length = 160

[tool.pytest.ini_options]
addopts = ["-vvv", "-n", "2", "--log-level", "WARNING", "--color", "yes"]
filterwarnings = ['ignore:AnsibleCollectionFinder has already been configured']
testpaths = ["tests"]


[dependency-groups]
test = [
    "pytest",
    "pytest-mock",      # Provides the 'mocker' fixture
    "pytest-ansible",   # From test-requirements.txt
    "pytest-xdist",     # From test-requirements.txt
    "requests",         # Used in test files
]
integration = [
    "molecule",         # From test-requirements.txt
    "ansible-navigator",
]
dev = [
    {include-group = "test"},
    {include-group = "integration"},
]
[tool.isort]
profile = "black"
line_length = 160
known_first_party = ["ansible_collections.hashicorp.terraform"]
lines_after_imports = 2
lines_between_types = 1
extend_skip = [
    ".tox",
    ".pytest_cache",
    "__pycache__",
    "build",
    "dist",
    "*.egg-info",
]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true

[tool.coverage.run]
source = ["plugins"]
omit = [
    "*/tests/*",
    "*/test_*",
    "*/__pycache__/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
]
