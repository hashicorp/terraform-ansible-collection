sonar.projectKey=ansible_hashicorp.terraform
sonar.organization=ansible

# Default branch configuration
sonar.branch.name=main

# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=hashicorp.terraform
#sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
# Only include source code, not test files
sonar.sources=plugins

# Explicitly define test directories (these will be analyzed but not required to have coverage)
sonar.tests=tests

# Exclude test files from coverage analysis 
sonar.coverage.exclusions=tests/**/*,**/test_*.py,**/*_test.py

# Exclude test files from duplication analysis
sonar.cpd.exclusions=tests/**/*

# File patterns to exclude from analysis entirely
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/*.pyo,**/.pytest_cache/**

# Python-specific settings
sonar.python.coverage.reportPaths=code.cov

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8
