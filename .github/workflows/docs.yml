---
name: docs

env:
  LC_ALL: "C.UTF-8"

on: # yamllint disable-line rule:truthy
  pull_request:
  push:
    branches: [main, devel, stable-1, stable-2]
  workflow_dispatch:

jobs:
  lint-collection-docs:
    name: antsibull-docs lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out the collection
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          path: ansible_collections/hashicorp/terraform

      - name: Install python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Install ansible-core, antsibull-docs and pytfe
        run: |
          python -m pip install --upgrade pip
          python -m pip install ansible-core antsibull-docs 'pytfe>=1.2.0'

      # antsibull-docs --plugin-docs imports every plugin, so pytfe must be
      # importable and the collection must live under ansible_collections/.
      - name: Lint collection docs
        run: >-
          antsibull-docs lint-collection-docs
          --plugin-docs
          --check-extra-docs-refs
          --validate-collection-refs self
          .
        working-directory: ansible_collections/hashicorp/terraform
        env:
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}
