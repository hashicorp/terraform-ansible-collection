---
name: linting

env:
  LC_ALL: "C.UTF-8" # prevent ERROR: Ansible could not initialize the preferred locale: unsupported locale setting

on:
  pull_request:
  push:
    branches: [main, devel]

jobs:
  common-tests:
    name: ${{ matrix.tests.name }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        tests:
          - name: flake8
            command: check_flake8
          - name: black
            command: check_black
          - name: isort
            command: check_isort
    steps:
      - name: Install make
        run: sudo apt install make

      - uses: actions/checkout@v4

      - name: Install python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install requirements
        run: pip3.11 install -r test-requirements.txt

      - name: Run check ${{ matrix.tests.name }}
        run: make ${{ matrix.tests.command }}

  docs:
    name: Check module doc strings
    runs-on: ubuntu-latest
    env:
      HEADLESS: "yes"
    steps:
      - name: Install python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install requirements
        run: pip3.11 install --upgrade ansible

      - uses: actions/checkout@v4

      - name: Run ansible-doc
        run: make collection-docs

      - name: Get ansible-doc version
        run: ansible-doc --version
        if: failure()

  build-import:
    name: Build collection and run galaxy importer check
    uses: ansible/ansible-content-actions/.github/workflows/build_import.yaml@main
