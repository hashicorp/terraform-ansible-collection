---
name: Release hashicorp.terraform

on:   # yamllint disable-line rule:truthy
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ah_publish:
        description: 'Publish to Automation Hub'
        type: boolean
        default: true
jobs:
  release_automation_hub:
    uses: ansible/ansible-content-actions/.github/workflows/release_ah.yaml@main
    with:
      environment: ah
    secrets:
      ah_token: ${{ secrets.AH_TOKEN }}
