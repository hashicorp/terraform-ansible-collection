minor_changes:
  - >-
    inventory plugin (source=outputs) - rename the reserved host variable produced for primitive
    shapes from ``value`` to ``item``, matching Ansible's loop vocabulary (``item`` in
    ``loop`` / ``with_items``). Applies to ``string``, ``number``, ``bool``,
    ``list(<primitive>)``, ``set(<primitive>)``, and ``map(<primitive>)`` outputs. Reference
    it from ``compose`` entries and templates as ``item``.
  - >-
    inventory plugin (source=outputs) - drop the per-spec ``use_as`` shortcut. The
    inventory-level ``compose`` option is now the single mental model for assigning host
    variables (for example, set ``compose.ansible_host`` to ``item``).
  - >-
    inventory plugin (source=outputs) - automatically assign ``ansible_host`` to the primitive
    value for ``string``, ``list(<primitive>)``, ``set(<primitive>)``, and ``map(<primitive>)``
    shapes when the inventory's ``compose`` option is empty. Setting any ``compose`` entry
    suppresses this default — ``compose`` is then in full control. Object shapes
    (``object``, ``list(object)``, ``set(object)``, ``map(object)``) never auto-assign.
  - >-
    inventory plugin (source=outputs) - unify the per-host variable shape across every
    ``hosts_from`` type. Each host now exposes at most two top-level variables: ``item``
    (always — the primitive value or the user dict, sandboxed) and ``key`` (only for
    ``map(...)`` shapes — the map key). User dict fields are deliberately not spread at the
    top level, eliminating Ansible reserved-name collisions (``name``, ``groups``, ``tags``,
    ``inventory_hostname``, …) by construction. The ``map(object)`` reserved-field check
    (``item`` / ``key``) is removed — collision is impossible under the new model.
  - >-
    inventory plugin (source=outputs) - ``hostnames`` and the include / exclude filter
    resolvers now interpret dotted keys as nested-dict paths through the host vars
    (e.g. ``hostnames: [item.name]`` walks ``host_vars["item"]["name"]``). Single-segment
    keys behave exactly as before; this is a strict extension of the prior lookup.
breaking_changes:
  - >-
    inventory plugin (source=outputs) - the host variable formerly named ``value`` for
    primitive shapes is now named ``item``. Update any ``compose`` entries, ``hostnames``
    references, and templates that read ``value`` from primitive ``hosts_from`` records.
  - >-
    inventory plugin (source=outputs) - the per-spec ``use_as`` field is removed.
    ``hosts_from`` configurations that include ``use_as`` are rejected at validation time with
    a migration error. Replace it with an inventory-level ``compose`` entry; for the common
    ``use_as=ansible_host`` case you can usually drop the field entirely, since primitive
    shapes auto-assign ``ansible_host`` when ``compose`` is empty.
  - >-
    inventory plugin (source=outputs) - object shapes (``object``, ``list(object)``,
    ``set(object)``, ``map(object)``) no longer spread user fields at the top level of host
    vars. The user dict now lives under ``item``. Update ``compose`` to dotted form
    (``compose: {ansible_host: item.public_ip}``), update ``hostnames`` (``hostnames:
    [item.name]``), and update include / exclude filter keys (``include_filters: [{item.role:
    web}]``). The ``key`` variable for ``map(...)`` shapes stays at the top level.
