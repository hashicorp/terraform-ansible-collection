---
minor_changes:
  - >-
    tf_org_tags lookup - New lookup plugin ``hashicorp.terraform.tf_org_tags`` that
    returns all organization tags as a list of dicts (``id``, ``name``,
    ``instance_count``).  Supports an optional ``query`` parameter for partial-name
    filtering (maps to ``?q=`` on the API) and an optional
    ``filter_exclude_taggable_id`` parameter that excludes tags already associated
    with a given workspace (maps to ``?filter[exclude][taggable][id]=``), making it
    easy to discover which tags are available to add to a specific workspace.
