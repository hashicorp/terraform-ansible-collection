---
minor_changes:
  - >-
    inventory - The ``hashicorp.terraform.tfc_inv`` dynamic inventory plugin
    now supports B(multi-workspace mode). Setting the new ``workspace_filters``
    option (mutually exclusive with ``workspace`` / ``workspace_id``) enumerates
    every matching workspace via the HCP Terraform Workspaces list API and
    merges inventory across them. Supported filter keys map onto pytfe's
    ``WorkspaceListOptions``: ``project_id``, ``name_search``, ``tags``,
    ``exclude_tags``, ``wildcard_name``, ``current_run_status``, ``sort``,
    ``page_size``. Project name resolution is not supported; pass the project
    ID directly (``prj-...``).
  - >-
    inventory - Every host produced in multi-workspace mode is stamped with
    auto-injected ``tfc_workspace_id`` and ``tfc_workspace_name`` variables
    so playbooks can route by origin. These names are exempt from
    ``hostvars_prefix`` / ``hostvars_suffix`` renaming.
  - >-
    inventory - New ``enable_parallel_processing`` option (default ``false``)
    and ``concurrency`` option (default ``5``, hard cap ``10``) drive concurrent
    per-workspace fetches via a thread pool. Each worker constructs its own
    pytfe client; Ansible inventory mutation always happens on the main
    thread.
  - >-
    inventory - Multi-workspace mode reuses the existing per-workspace cache
    blob shape unchanged (so a workspace cached in single-workspace mode by
    ID is bit-for-bit reusable in filter mode) and adds a separate
    B(selector cache) keyed by ``(source, organization, workspace_filters)``
    that eliminates the workspace list API call on warm runs. With both
    layers warm, multi-workspace inventory is fully offline-capable within
    ``cache_timeout`` — the same contract as single-workspace mode.
  - >-
    inventory - In multi-workspace mode with
    ``cache_validate_current_state_version: true``, a workspace whose
    ``state_versions.read_current()`` call fails is excluded from inventory
    with a warning rather than failing the whole sync. This is a more lenient
    contract than single-workspace mode (which raises), justified by the
    "fan-out" nature of filter mode where one workspace being unreachable
    should not block the rest.
