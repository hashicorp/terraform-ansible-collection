minor_changes:
  - >-
    inventory plugin (source=outputs) - align the ``hosts_from`` ``type``
    vocabulary with Terraform's official type system
    (https://developer.hashicorp.com/terraform/language/expressions/types).
    The full set of Terraform type expressions is now accepted: primitives
    (``string`` / ``number`` / ``bool``), structural types (``object``,
    ``object({attr=type,...})``, ``tuple``, ``tuple([T,...])``), and
    collections (``list(T)`` / ``set(T)`` / ``map(T)`` for primitive and
    object element types).
  - >-
    inventory plugin (source=outputs) - accept ``object({attr=type,...})`` as
    a wire-level synonym for bare ``object``. The schema body is informational
    (Terraform has already validated it); on the wire the value is just a
    JSON dict and is treated identically to ``object``.
  - >-
    inventory plugin (source=outputs) - accept ``tuple`` and
    ``tuple([T,...])`` as wire-level synonyms for ``dynamic`` when used on a
    sequence value. A Terraform tuple is a JSON array on the wire,
    indistinguishable from a list, so the element-types body is informational
    and runtime detection picks the matching shape (``list(<primitive>)`` or
    ``list(object)``; mixed-element arrays are skipped with a warning, same
    as ``dynamic``).
  - >-
    inventory plugin (source=outputs) - the ``parse_type`` error message now
    links to Terraform's type-system reference page so users have a one-click
    path to the canonical vocabulary.
breaking_changes:
  - >-
    inventory plugin (source=outputs) - rename the ``hosts_from`` runtime-shape
    detection mode from ``auto`` to ``dynamic`` to match Terraform's
    plugin-framework
    ``dynamic`` type
    (https://developer.hashicorp.com/terraform/plugin/framework/handling-data/types/dynamic).
    Update any ``hosts_from`` entries that set ``type: auto`` to
    ``type: dynamic``. The default when ``type`` is omitted is now
    ``dynamic``. ``auto`` is no longer accepted as a value for ``type``.
