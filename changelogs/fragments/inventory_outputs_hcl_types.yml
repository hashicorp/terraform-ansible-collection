minor_changes:
  - inventory plugin (source=outputs) - replace the ``kind`` / ``element_type`` pair on each ``hosts_from`` entry with a single HCL-style ``type`` expression that mirrors Terraform's own type system (``string``, ``number``, ``bool``, ``object``, ``list(<primitive>)``, ``list(object)``, ``map(<primitive>)``, ``map(object)``).
  - inventory plugin (source=outputs) - accept ``set(...)`` as a synonym for ``list(...)`` (the API serializes both as JSON arrays, so they are indistinguishable on the wire).
  - inventory plugin (source=outputs) - add an experimental ``auto`` mode (``type=auto``, also the default when ``type`` is omitted) that infers the host shape from the runtime output value. A dict of dicts becomes ``map(object)``, any other dict becomes ``object``, a list of dicts becomes ``list(object)``, a list of all primitives becomes ``list(<primitive>)``, primitive scalars become the matching primitive, and empty / null / mixed-list values are skipped (with a warning for the mixed case). Note that a dict of primitives is treated as ``object`` rather than ``map(string)`` — declare ``type=map(string)`` explicitly to opt in to the map semantics.
  - inventory plugin (source=outputs) - validate ``hosts_from`` specs upfront in ``validate_options``; invalid type expressions, missing ``output`` names, and unsupported nested shapes (``tuple``, ``map(list(...))``, ``object({...})``, etc.) now fail with a clear configuration error before any API call instead of silently producing empty inventories.
breaking_changes:
  - inventory plugin (source=outputs) - the ``hosts_from.kind`` and ``hosts_from.element_type`` fields are removed and no longer accepted. Replace them with a single ``type`` expression (``kind=scalar`` and ``element_type=string`` becomes ``type=string``; ``kind=list`` and ``element_type=object`` becomes ``type=list(object)``; ``kind=map`` and ``element_type=string`` becomes ``type=map(string)``; etc.). The previous form never shipped to a tagged release, so no migration shim is provided.
