bugfixes:
  - project - Fixed idempotent runs returning only ``changed=false`` with no resource data; the module now returns the full project attributes (including ``id``, ``name``, ``description``, etc.) even when no changes are made (https://github.com/hashicorp/terraform-ansible-collection/issues/142).
  - workspace - Fixed idempotent runs returning only ``changed=false`` with no resource data; the module now returns the full workspace attributes (including ``id``, ``name``, ``execution_mode``, etc.) even when no changes are made (https://github.com/hashicorp/terraform-ansible-collection/issues/142).
