---
minor_changes:
  - >-
    modules - Added ``hashicorp.terraform.team``, ``hashicorp.terraform.team_info``,
    ``hashicorp.terraform.team_project_access``, ``hashicorp.terraform.team_workspace_access``,
    ``hashicorp.terraform.user_info``, ``hashicorp.terraform.organization_tags``, and
    ``hashicorp.terraform.variable_set_variable`` for managing teams, team access to
    projects and workspaces, user information, organization-tag/workspace associations,
    and variables within variable sets. The ``team_info`` module can retrieve a single
    team by ID, list all teams in an organization, or look one up by name.
