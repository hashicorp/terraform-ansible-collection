---
minor_changes:
  - >-
    modules - Added ``hashicorp.terraform.agent_pool`` and
    ``hashicorp.terraform.agent_pool_info`` for managing and inspecting
    Terraform Cloud/Enterprise agent pools. Agent pools group Terraform Cloud
    Agents so that C(execution_mode=agent) workspaces and projects can run on
    private, self-hosted infrastructure. The ``agent_pool`` module supports
    organization scoping and per-workspace/per-project allow and exclude lists;
    ``agent_pool_info`` can read a pool by ID, look one up by name, or list all
    pools in an organization.
