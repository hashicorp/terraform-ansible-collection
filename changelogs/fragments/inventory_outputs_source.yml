minor_changes:
  - >-
    inventory plugin (source=outputs) - the ``hosts_from`` option accepts the
    full Terraform type-expression vocabulary
    (https://developer.hashicorp.com/terraform/language/expressions/types):
    primitives (``string`` / ``number`` / ``bool``), structural types
    (``object``, ``object({attr=type,...})``, ``tuple``, ``tuple([T,...])``),
    and collections (``list(T)`` / ``set(T)`` / ``map(T)`` for primitive and
    object element types). Wire-level synonyms collapse to the same handler:
    ``set(T)`` is treated as ``list(T)``, ``object({...})`` as ``object``,
    ``tuple`` / ``tuple([...])`` as ``dynamic``.
  - >-
    inventory plugin (source=outputs) - the default ``type`` (when omitted)
    is ``dynamic``, mirroring Terraform's plugin-framework "dynamic" type
    (https://developer.hashicorp.com/terraform/plugin/framework/handling-data/types/dynamic).
    The shape is determined at runtime from the JSON payload — a dict of
    dicts becomes ``map(object)``, a list of dicts becomes ``list(object)``,
    a list of uniform primitives becomes ``list(<primitive>)``, primitive
    scalars match their type, and empty / null / mixed-type values are
    skipped (with a warning for the mixed-list case).
  - >-
    inventory plugin (source=outputs) - object-shape outputs (``object``,
    ``list(object)``, ``set(object)``, ``map(object)``) spread the user dict
    fields at the top level of host_vars, matching the convention used by
    ``amazon.aws.aws_ec2``. Reference fields directly with
    ``compose: {ansible_host: public_ip}``, ``hostnames: [name]``,
    ``keyed_groups: [{key: env}]`` — no wrapper or dotted-path ceremony.
  - >-
    inventory plugin (source=outputs) - primitive-shape outputs (``string``,
    ``number``, ``bool``, and the per-element view of
    ``list(<primitive>)`` / ``set(<primitive>)`` / ``map(<primitive>)``)
    expose the scalar as a single host variable named ``value``, matching
    Terraform's outputs API field name. ``value`` is distinct from
    Ansible's loop variable ``item`` and lives in a different scope.
  - >-
    inventory plugin (source=outputs) - automatically assign ``ansible_host``
    to the scalar for ``string`` / ``list(<primitive>)`` /
    ``set(<primitive>)`` / ``map(<primitive>)`` shapes when the inventory's
    ``compose`` option is empty. Setting any ``compose`` entry suppresses
    this default — ``compose`` is then in full control. Object shapes never
    auto-assign.
  - >-
    inventory plugin (source=outputs) - for ``map(<primitive>)`` and
    ``map(object)`` shapes the map key becomes the resolved hostname and is
    available as ``inventory_hostname``. No separate ``key`` host variable is
    injected, so user dicts containing a field named ``key`` are preserved
    as-is.
  - >-
    inventory plugin (source=outputs) - new ``hostvars_prefix`` and
    ``hostvars_suffix`` options for namespace-collision avoidance, mirroring
    ``amazon.aws.aws_ec2``. When a Terraform output field collides with an
    Ansible-reserved variable name (``name``, ``groups``, ``tags``,
    ``inventory_hostname``, …), set ``hostvars_prefix: tf_`` to rename every
    user field on registration (``name`` → ``tf_name``) and silence the
    "Found variable using reserved name" warning. The plugin-injected
    variables ``ansible_host`` and ``value`` are never renamed. ``compose``,
    ``keyed_groups``, ``groups``, ``hostnames``, and filter keys all
    reference the original (un-prefixed) field names — the prefix is a
    storage-time rename only.
  - >-
    inventory plugin - the ``hostnames`` resolver supports dotted paths into
    nested user-data dicts (e.g. ``hostnames: [tags.role]`` walks
    ``host_vars["tags"]["role"]`` for an object that contains a ``tags``
    field). Filter keys (``include_filters``, ``exclude_filters``) accept
    the same dotted-path syntax.
  - >-
    inventory plugin (source=outputs) - validate ``hosts_from`` specs upfront
    in ``validate_options``. Invalid type expressions, missing ``output``
    names, and unsupported nested shapes (``map(list(...))``,
    ``list(map(...))``, etc.) now fail with a clear configuration error
    before any API call, instead of silently producing empty inventories.
    Error messages link to Terraform's type-system reference page.
breaking_changes:
  - >-
    inventory plugin - the ``hostnames`` resolver no longer falls back to a
    literal-string interpretation when a preference does not resolve in the
    current host's variables. Unresolved preferences return ``None`` and the
    next preference (or the ``<workspace>_<output>[_<index>]`` default) is
    used. This prevents the silent-collapse failure mode where a misspelled
    ``hostnames: [name]`` produced a single host literally named ``name``.
    Users who genuinely want a static hostname should use ``compose``
    (``compose: {ansible_host: '"static"'}``) instead.
