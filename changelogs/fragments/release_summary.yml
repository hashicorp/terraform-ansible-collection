---
release_summary: >-
  This release adds team and access-management modules (teams, team info, team-project
  access, and team-workspace access), user information, organization-tag association, and
  variable-set variable management. It also extends the dynamic inventory plugin with
  Ansible-standard caching and multi-workspace scanning, adds Terraform refresh-only and
  action-only runs, and supports parent relationships when creating variable sets.
